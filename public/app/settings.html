<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Путь  настройки</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f3efe8;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.5;
            color: #2a2f2b;
            padding: 2rem 1rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .settings-card {
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15), inset 0 1px 2px rgba(255, 255, 255, 0.8);
            padding: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            color: #8d7f71;
            border-bottom: 1px solid #e4d9cf;
            padding-bottom: 0.8rem;
        }

        .nav-left {
            font-weight: 500;
            cursor: pointer;
        }

        .settings-header {
            margin-bottom: 2rem;
        }

        .settings-header h1 {
            font-size: 2rem;
            font-weight: 450;
            color: #2e3b32;
        }

        .settings-header p {
            color: #7b6b5c;
        }

        .settings-section {
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid #e4d9cf;
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 500;
            color: #3f5142;
            margin-bottom: 1.2rem;
        }

        /* Аватар */
        .avatar-container {
            display: flex;
            align-items: center;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .avatar-preview {
            position: relative;
            width: 120px;
            height: 120px;
        }

        .avatar-image {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(145deg, #d9c8b8, #b7a48f);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4d3b2c;
            border: 3px solid white;
            overflow: hidden;
        }

        .avatar-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-buttons {
            display: flex;
            gap: 1rem;
        }

        .avatar-btn {
            background: #d8cdbf;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.9rem;
            color: #2f3e32;
            border: 1px solid rgba(255,255,255,0.6);
        }

        .avatar-btn.delete {
            background: #f0ebe4;
            color: #a15555;
        }

        /* Поля */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-size: 0.9rem;
            color: #5e6b53;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            background: white;
            border: 1px solid #e0d3c5;
            border-radius: 60px;
            padding: 0.8rem 1.2rem;
            font-size: 1rem;
            color: #2a2f2b;
            outline: none;
        }

        .form-input:focus {
            border-color: #b8a48f;
            box-shadow: 0 0 0 3px rgba(180, 160, 140, 0.15);
        }

        .form-select {
            width: 100%;
            background: white;
            border: 1px solid #e0d3c5;
            border-radius: 60px;
            padding: 0.8rem 1.2rem;
            font-size: 1rem;
            color: #2a2f2b;
            outline: none;
            cursor: pointer;
        }

        .save-btn {
            background: #7f9a6b;
            border: none;
            padding: 1rem 2rem;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 500;
            color: white;
            cursor: pointer;
            width: 100%;
            margin: 1rem 0;
            transition: 0.2s;
        }

        .save-btn:hover {
            background: #6b8557;
        }

        .user-handle-section {
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid #e4d9cf;
            text-align: center;
            color: #7b6b5c;
            font-size: 0.9rem;
        }

        .user-handle {
            font-weight: 500;
            color: #5e6b53;
        }

        .footer-note {
            text-align: center;
            margin-top: 2rem;
            color: #a49888;
            font-size: 0.85rem;
        }

        .message {
            padding: 0.8rem;
            border-radius: 2rem;
            margin-bottom: 1rem;
            text-align: center;
            display: none;
        }

        .message.success {
            background: #e7f3e5;
            color: #2f6b3e;
            border: 1px solid #b8d9b0;
        }

        .message.error {
            background: #fee2e2;
            color: #b91c1c;
            border: 1px solid #fecaca;
        }

        @media (max-width: 500px) {
            .avatar-container {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>

<div class="settings-card">
    <div class="nav-bar">
        <span class="nav-left" onclick="window.location.href='/app/profile.html'"> мой путь</span>
    </div>

    <div class="settings-header">
        <h1>настройки</h1>
        <p>профиль, приватность</p>
    </div>

    <div id="message" class="message"></div>

    <form id="settingsForm">
        <!-- Аватар -->
        <div class="settings-section">
            <div class="section-title">фото профиля</div>
            <div class="avatar-container">
                <div class="avatar-preview">
                    <div class="avatar-image" id="avatarPreview">
                        <img id="avatarImg" src="" style="display:none;">
                        <span id="avatarPlaceholder">фото</span>
                    </div>
                </div>
                <div class="avatar-buttons">
                    <input type="file" id="avatarUpload" accept="image/*" style="display:none;">
                    <button type="button" class="avatar-btn" onclick="document.getElementById('avatarUpload').click()">загрузить</button>
                    <button type="button" class="avatar-btn delete" onclick="deleteAvatar()">удалить</button>
                </div>
            </div>
        </div>

        <!-- Основная информация -->
        <div class="settings-section">
            <div class="section-title">о себе</div>
            
            <div class="form-group">
                <label class="form-label">статус</label>
                <select class="form-select" id="statusSelect">
                    <option value="">нет статуса</option>
                    <option value="ищущий">ищущий</option>
                    <option value="практикующий">практикующий</option>
                    <option value="наставник">наставник</option>
                    <option value="просветлённый">просветлённый</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">цитата</label>
                <input type="text" class="form-input" id="quoteInput" placeholder="ваша цитата">
            </div>
        </div>

        <!-- Приватность -->
        <div class="settings-section">
            <div class="section-title">приватность</div>
            
            <div class="form-group">
                <label class="form-label">кто видит трекеры</label>
                <select class="form-select" id="trackersPrivacy">
                    <option value="только я">только я</option>
                    <option value="друзья">друзья</option>
                    <option value="все">все</option>
                </select>
            </div>

          
        </div>

        <button type="button" class="save-btn" onclick="saveSettings()">сохранить изменения</button>
    </form>

    <div class="user-handle-section" id="userHandleSection">
        ваш ник: <span class="user-handle" id="userHandle">@загрузка...</span>
    </div>

    <div class="footer-note">
        каждый день  шаг на пути
    </div>
</div>

<script>
    const token = localStorage.getItem('token');
    if (!token) {
        window.location.href = '/';
    }

    let currentUser = null;

    async function apiRequest(url, options = {}) {
        const headers = {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token,
            ...options.headers
        };
        const response = await fetch('/api' + url, { ...options, headers });
        if (!response.ok) {
            const text = await response.text();
            throw new Error(text);
        }
        return response.json();
    }

    async function loadSettings() {
        try {
            currentUser = await apiRequest('/user');
            
            document.getElementById('statusSelect').value = currentUser.status || '';
            document.getElementById('quoteInput').value = currentUser.quote || '';
            document.getElementById('trackersPrivacy').value = currentUser.trackers_privacy || 'друзья';            
            document.getElementById('userHandle').textContent = '@' + (currentUser.username || 'unknown');
            
            if (currentUser.avatar_url) {
                const avatarImg = document.getElementById('avatarImg');
                const avatarPlaceholder = document.getElementById('avatarPlaceholder');
                
                avatarImg.src = '/storage/' + currentUser.avatar_url;
                avatarImg.style.display = 'block';
                avatarPlaceholder.style.display = 'none';
            }
            
        } catch (err) {
            showMessage('Ошибка загрузки настроек', 'error');
        }
    }

    async function saveSettings() {
        try {
            await apiRequest('/user/status', {
                method: 'PUT',
                body: JSON.stringify({ status: document.getElementById('statusSelect').value })
            });
            
            await apiRequest('/user/quote', {
                method: 'PUT',
                body: JSON.stringify({ quote: document.getElementById('quoteInput').value })
            });
            
            
            
            
            
            showMessage('Настройки сохранены', 'success');
            
            setTimeout(() => {
                window.location.href = '/app/profile.html';
            }, 1000);
            
        } catch (err) {
            showMessage('Ошибка сохранения', 'error');
        }
    }

    async function compressImage(file, maxWidth = 400, quality = 0.8) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    
                    if (width > maxWidth) {
                        height = Math.round(height * maxWidth / width);
                        width = maxWidth;
                    }
                    
                    canvas.width = width;
                    canvas.height = height;
                    canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                    
                    canvas.toBlob((blob) => {
                        resolve(new File([blob], file.name, {
                            type: 'image/jpeg',
                            lastModified: Date.now()
                        }));
                    }, 'image/jpeg', quality);
                };
                img.onerror = reject;
            };
            reader.onerror = reject;
        });
    }

    document.getElementById('avatarUpload').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        try {
            const compressedFile = await compressImage(file, 400, 0.8);
            
            const formData = new FormData();
            formData.append('avatar', compressedFile);
            
            const response = await fetch('/api/user/avatar', {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + token },
                body: formData
            });
            
            if (!response.ok) throw new Error('Upload failed');
            
            const data = await response.json();
            currentUser = data.user;
            
            const avatarImg = document.getElementById('avatarImg');
            const avatarPlaceholder = document.getElementById('avatarPlaceholder');
            
            avatarImg.src = '/storage/' + currentUser.avatar_url;
            avatarImg.style.display = 'block';
            avatarPlaceholder.style.display = 'none';
            
            showMessage('Аватар загружен', 'success');
            
        } catch (err) {
            showMessage('Ошибка загрузки фото', 'error');
        }
    });

    async function deleteAvatar() {
        if (!confirm('Удалить фото профиля?')) return;
        
        try {
            await apiRequest('/user/avatar', { method: 'DELETE' });
            
            const avatarImg = document.getElementById('avatarImg');
            const avatarPlaceholder = document.getElementById('avatarPlaceholder');
            
            avatarImg.style.display = 'none';
            avatarImg.src = '';
            avatarPlaceholder.style.display = 'block';
            
            showMessage('Аватар удален', 'success');
            
        } catch (err) {
            showMessage('Ошибка удаления', 'error');
        }
    }

    function showMessage(text, type) {
        const msg = document.getElementById('message');
        msg.textContent = text;
        msg.className = `message ${type}`;
        msg.style.display = 'block';
        
        setTimeout(() => {
            msg.style.display = 'none';
        }, 3000);
    }

    loadSettings();
</script>
</body>
</html>
