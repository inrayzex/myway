<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Мой Путь&nbsp;&#183;&nbsp;клубы</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f0ebe4;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.5;
            color: #2d342e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .clubs-card {
            width: 1200px;            
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15), inset 0 1px 2px rgba(255, 255, 255, 0.8);          
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

   .feed-layout {
        padding: 2rem;
}

        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 1rem 2rem 0 2rem;
            color: #8d7f71;
            border-bottom: 1px solid #e4d9cf;
            padding-bottom: 0.8rem;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
        }

        .nav-links span {
            cursor: pointer;
        }

        .nav-links .active {
            border-bottom: 2px solid #a48e78;
            padding-bottom: 0.2rem;
        }

        .clubs-header {
            margin-bottom: 2rem;
        }

        .clubs-header h1 {
            font-size: 2.5rem;
            font-weight: 450;
            color: #2e3b32;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
            padding-left: 1rem;
        }

        .clubs-header p {
            color: #6b6258;
            max-width: 600px;
            padding-left: 1rem;
        }

        .clubs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin: 2rem 0;
        }

        .club-card {
            background: white;
            border-radius: 2rem;
            padding: 1.5rem;
            border: 1px solid #ede3d8;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .club-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px -8px rgba(90, 70, 50, 0.15);
            border-color: #cbb9a8;
        }

        .club-cover {
            height: 100px;
            background: linear-gradient(145deg, #b8aa9a, #9a8b7a);
            border-radius: 1rem;
            margin-bottom: 1rem;
            background-size: cover;
            background-position: center;
        }

        .club-name {
            font-size: 1.3rem;
            font-weight: 500;
            color: #2e3b32;
            margin-bottom: 0.3rem;
        }

        .club-description {
            color: #6b6258;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            line-height: 1.4;
        }

        .club-meta {
            display: flex;
            gap: 1rem;
            color: #7b6b5c;
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }

        .club-type {
            background: #e7ddd2;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            font-size: 0.8rem;
            color: #5f4c3b;
            display: inline-block;
        }

        .create-club-btn {
            background: #d8cdbf;
            border: none;
            padding: 0.5rem 2rem;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 500;
            color: #2f3e32;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.6);
            width: 100%;
            margin: 1rem 0;
            transition: 0.2s;
        }

        .create-club-btn:hover {
            background: #c2b3a1;
        }

        .loader {
            text-align: center;
            padding: 3rem;
            color: #7b6b5c;
        }

        .no-clubs {
            text-align: center;
            padding: 3rem;
            color: #7b6b5c;
            font-style: italic;
        }

        .footer-note {
            text-align: center;
            margin-top: 2rem;
            color: #a49888;
            font-size: 0.85rem;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: 2rem;
            max-width: 400px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .modal-content h3 {
            font-size: 1.3rem;
            font-weight: 450;
            color: #2e3b32;
            margin-bottom: 1rem;
        }

        .modal-content input,
        .modal-content textarea,
        .modal-content select {
            width: 100%;
            padding: 0.8rem 1rem;
            border-radius: 2rem;
            border: 1px solid #e0d3c5;
            margin-bottom: 1rem;
            font-family: inherit;
        }

        .modal-content textarea {
            resize: vertical;
        }

        .modal-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        .modal-btn {
            flex: 1;
            padding: 0.8rem;
            border: none;
            border-radius: 2rem;
            cursor: pointer;
            font-size: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .modal-btn.confirm {
            background: #d8cdbf;
            color: #2f3e32;
        }

        .modal-btn.cancel {
            background: #f0ebe4;
            color: #786e62;
        }

        @media (max-width: 768px) {
            .clubs-grid {
                grid-template-columns: 1fr;
            }
        }







/* ===== ГАМБУРГЕР МЕНЮ ===== */
.mobile-header {
    display: none;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    padding-left: 1rem;
    padding-right: 1rem;
    padding-bottom: 0.4rem;
    border-bottom: 1px solid #e4d9cf;
    margin-bottom: 1rem;
    color: #8d7f71; /* основной цвет */
}

.hamburger-icon {
    width: 30px;
    height: 20px;
    position: relative;
    cursor: pointer;
    z-index: 1001;
}

.hamburger-icon span {
    display: block;
    position: absolute;
    height: 1px;
    width: 100%;
    background: #8d7f71; /* цвет полосок */
    border-radius: 3px;
    transition: all 0.3s ease;
}

.hamburger-icon span:nth-child(1) { top: 0; }
.hamburger-icon span:nth-child(2) { top: 8px; }
.hamburger-icon span:nth-child(3) { top: 16px; }

.hamburger-icon.open span:nth-child(1) {
    transform: rotate(45deg);
    top: 8px;
}

.hamburger-icon.open span:nth-child(2) {
    opacity: 0;
}

.hamburger-icon.open span:nth-child(3) {
    transform: rotate(-45deg);
    top: 8px;
}

.menu-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.3);
    backdrop-filter: blur(3px);
    -webkit-backdrop-filter: blur(3px);
    z-index: 1000;
    opacity: 0;
    transition: opacity 0.3s ease;
}

.menu-overlay.show {
    display: block;
    opacity: 1;
}

.side-menu {
    position: fixed;
    top: 0;
    right: -300px;
    width: 280px;
    height: 100%;
    background: rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-left: 1px solid rgba(180, 160, 140, 0.2);
    z-index: 1001;
    transition: right 0.3s ease;
    padding: 2rem 1.5rem;
    pointer-events: none;
}

.side-menu.open {
    right: 0;
    pointer-events: auto;
}

.side-menu-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid #e4d9cf;
}

.menu-logo {
 /*   font-size: 1.3rem;
    font-weight: 500;*/
    color: #8d7f71; /* одинаковый цвет с основным */
}

.menu-close {
    font-size: 1.3rem;
    cursor: pointer;
    color: #8d7f71;
    padding: 0.3rem 0.5rem;
    border-radius: 50%;
}

.menu-close:hover {
    background: rgba(180, 160, 140, 0.2);
}

.side-menu-items {
    display: flex;
    flex-direction: column;
    gap: 1rem;
}

.side-menu-items a {
    color: #8d7f71; /* теперь как в ПК-меню */
    text-decoration: none;
    font-size: 1.1rem;
    padding: 0.5rem 0;
    border-bottom: 1px solid rgba(180, 160, 140, 0.2);
    transition: all 0.2s;
}

.side-menu-items a:hover {
    color: #2e3b32; /* тёмно-зелёный при наведении */
    padding-left: 0.5rem;
}

.side-menu-items a.animate {
    transform: translateX(20px);
    opacity: 0;
    animation: slideIn 0.3s ease forwards;
}

@keyframes slideIn {
    to {
        transform: translateX(0);
        opacity: 1;
    }
}

/* Медиазапросы */
@media (max-width: 768px) {
    .nav-bar {
        display: none !important;
    }
    .mobile-header {
        display: flex;
    }
    html, body {
        max-width: 100%;
        overflow-x: hidden;
        position: relative;
    }  
.feed-layout {
padding: 0rem;

}

}

@media (min-width: 769px) {
    .mobile-header, .side-menu, .menu-overlay {
        display: none !important;
    }
}


.page-wrapper
  {
   max-width:100%;
   overflow-x:hidden;
   margin: 0 auto;
   padding: 1rem;
   position: relative;
}


@media (max-width: 700px) {
   .clubs-card {
    padding:0.7rem;
    width:100%;
    }
      .page-wrapper
         {
         width:100%;  
         }

}

    </style>
</head>
<body>

  <div class="clubs-card">



<!-- Кнопка гамбургера -->
<div class="mobile-header">
   <div>
       <span onclick="window.location.href='/app/profile.html'" style="font-weight: 500; cursor:pointer;">мой путь</span>
   </div>
      <div class="hamburger-icon" id="hamburgerBtn">
         <span></span>
         <span></span>
         <span></span>
     </div>
</div>

<!-- Затемняющий фон -->
<div class="menu-overlay" id="menuOverlay"></div>

<!-- Меню справа -->
<div class="side-menu" id="sideMenu">
    <div class="side-menu-header">
        <span class="logo-menu"><a href="/app/profile.html" style="animation-delay: 0.1s;border-bottom:none;text-decoration:none;color: #2e3b32;">мой путь</a></span>
        <span class="menu-close" id="closeMenuBtn">&#10005;</span>
    </div>
    <div class="side-menu-items">
        <a href="/app/lenta.html" style="animation-delay: 0.2s">лента</a>
        <a href="/app/clubs.html" style="animation-delay: 0.3s">клубы</a>
        <a href="/app/knowledge.html" style="animation-delay: 0.4s">база</a>
        <a href="#" onclick="logout()" style="animation-delay: 0.5s">выйти</a>
    </div>
</div>


    <div class="nav-bar">
        <span onclick="window.location.href='/app/profile.html'" style="font-weight: 500; cursor:pointer;">мой путь</span>
        <div class="nav-links">
            <span onclick="window.location.href='/app/lenta.html'">лента</span>
            <span class="active">клубы</span>
            <span onclick="window.location.href='/app/knowledge.html'">база</span>
        </div>
    </div>


  <div class="feed-layout" >



    <div class="clubs-header">
        <h1>клубы</h1>
        <p>сообщества по интересам</p>
    </div>

    <button class="create-club-btn" onclick="showCreateClubModal()">создать клуб</button>

    <div id="clubsContainer" class="clubs-grid">
        <div class="loader">загрузка...</div>
    </div>

    <div class="footer-note">
        каждый день &#183; шаг на пути
    </div>
</div>

<!-- Модальное окно создания клуба -->
<div class="modal" id="createClubModal">
    <div class="modal-content">
        <h3>создать клуб</h3>
        <input type="text" id="clubName" placeholder="название">
        <textarea id="clubDesc" placeholder="описание" rows="3"></textarea>
        <select id="clubType">
            <option value="open">открытый</option>
            <option value="closed">закрытый</option>
            <option value="private">приватный</option>
        </select>


 <!-- Загрузка обложки -->
        <div style="margin: 1rem 0;">
            <label style="display: block; margin-bottom: 0.5rem; color: #5e6b53;">обложка клуба</label>
            <input type="file" id="clubCover" accept="image/*" style="display: none;">
            <div style="display: flex; gap: 1rem; align-items: center;">
                <div id="coverPreview" style="width: 80px; height: 80px; border-radius: 1rem; background: #e7ddd2; border: 1px solid #cbb9a8; display: flex; align-items: center; justify-content: center; overflow: hidden;">
                    <span id="coverPlaceholder"></span>
                </div>
                <button type="button" class="modal-btn" style="padding: 0.6rem 1rem;" onclick="document.getElementById('clubCover').click()">выбрать файл</button>
            </div>
        </div>



        <div class="modal-buttons">
            <button class="modal-btn confirm" onclick="createClub()">создать</button>
            <button class="modal-btn cancel" onclick="closeCreateClubModal()">отмена</button>
        </div>
    </div>
</div>
</div>
<script>
    const token = localStorage.getItem('token');
    if (!token) {
        window.location.href = '/';
    }

    async function apiRequest(url, options = {}) {
        const headers = {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token,
            ...options.headers
        };
        const response = await fetch('/api' + url, { ...options, headers });
        if (!response.ok) throw new Error(await response.text());
        return response.json();
    }

    async function loadClubs() {
        try {
            const clubs = await apiRequest('/clubs');
            renderClubs(clubs);
        } catch (err) {
            document.getElementById('clubsContainer').innerHTML = '<div class="no-clubs">ошибка загрузки</div>';
        }
    }





function renderClubs(clubs) {
    const container = document.getElementById('clubsContainer');
    
    if (clubs.length === 0) {
        container.innerHTML = '<div class="no-clubs">пока нет клубов</div>';
        return;
    }

    container.innerHTML = clubs.map(club => `
        <div class="club-card" onclick="window.location.href='/app/club.html?id=${club.id}'">
            <div class="club-cover" style="background-image: ${club.cover_url 
                ? `url(/storage/${club.cover_url})` 
                : 'linear-gradient(145deg, #b8aa9a, #9a8b7a)'}; background-size: cover; background-position: center;">
            </div>
            <div class="club-name">${club.name}</div>
            <div class="club-description">${club.description || 'чат  посты  вместе'}</div>
            <div class="club-meta">
                <span> ${club.members?.length || 0} участников</span>
                <span class="club-type">${club.type === 'open' ? 'открытый' : club.type === 'closed' ? 'закрытый' : 'приватный'}</span>
            </div>
        </div>
    `).join('');
}






    function showCreateClubModal() {
        document.getElementById('createClubModal').style.display = 'flex';
        document.getElementById('clubName').value = '';
        document.getElementById('clubDesc').value = '';
    }

    function closeCreateClubModal() {
        document.getElementById('createClubModal').style.display = 'none';
    }



// ===== ГАМБУРГЕР МЕНЮ =====
const hamburger = document.getElementById('hamburgerBtn');
const sideMenu = document.getElementById('sideMenu');
const overlay = document.getElementById('menuOverlay');
const closeBtn = document.getElementById('closeMenuBtn');

function openMenu() {
    sideMenu.classList.add('open');
    overlay.classList.add('show');
    hamburger.classList.add('open');
    
    const links = document.querySelectorAll('.side-menu-items a');
    links.forEach(link => {
        link.classList.remove('animate');
        void link.offsetWidth;
        link.classList.add('animate');
    });
}

function closeMenu() {
    sideMenu.classList.remove('open');
    overlay.classList.remove('show');
    hamburger.classList.remove('open');
    
    const links = document.querySelectorAll('.side-menu-items a');
    links.forEach(link => {
        link.classList.remove('animate');
    });
}

hamburger.addEventListener('click', function() {
    if (sideMenu.classList.contains('open')) {
        closeMenu();
    } else {
        openMenu();
    }
});

if (closeBtn) {
    closeBtn.addEventListener('click', closeMenu);
}

overlay.addEventListener('click', closeMenu);

document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && sideMenu.classList.contains('open')) {
        closeMenu();
    }
});




// Предпросмотр обложки
document.getElementById('clubCover').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const preview = document.getElementById('coverPreview');
            preview.innerHTML = `<img src="${e.target.result}" style="width:100%; height:100%; object-fit:cover;">`;
        };
        reader.readAsDataURL(file);
    }
});

// Функция сжатия (скопировать из предыдущего сообщения)
async function compressImage(file, maxWidth = 800, quality = 0.8) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (e) => {
            const img = new Image();
            img.src = e.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                let width = img.width;
                let height = img.height;
                
                if (width > maxWidth) {
                    height = Math.round(height * maxWidth / width);
                    width = maxWidth;
                }
                
                canvas.width = width;
                canvas.height = height;
                canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                
                canvas.toBlob((blob) => {
                    resolve(new File([blob], file.name, {
                        type: 'image/jpeg',
                        lastModified: Date.now()
                    }));
                }, 'image/jpeg', quality);
            };
            img.onerror = reject;
        };
        reader.onerror = reject;
    });
}





async function createClub() {
    const name = document.getElementById('clubName').value.trim();
    const description = document.getElementById('clubDesc').value.trim();
    const type = document.getElementById('clubType').value;
    const coverFile = document.getElementById('clubCover').files[0];

    if (!name) {
        alert('Введите название');
        return;
    }

    try {
        const formData = new FormData();
        formData.append('name', name);
        formData.append('description', description);
        formData.append('type', type);
        
        if (coverFile) {
            const compressedCover = await compressImage(coverFile, 800, 0.8);
            formData.append('cover', compressedCover);
        }

        const response = await fetch('/api/clubs', {
            method: 'POST',
            headers: {
                'Authorization': 'Bearer ' + token
            },
            body: formData
        });

        if (response.ok) {
            closeCreateClubModal();
            loadClubs();
        } else {
            const error = await response.text();
            alert('Ошибка: ' + error);
        }
    } catch (err) {
        alert('Ошибка соединения');
    }
}








    loadClubs();
</script>
