<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Путь  Статья</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f0ebe4;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #2d342e;
            padding: 0;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .article-card {
            max-width: 800px;
            width: 100%;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15), inset 0 1px 2px rgba(255, 255, 255, 0.8);
            padding: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            color: #8d7f71;
            border-bottom: 1px solid #e4d9cf;
            padding-bottom: 0.8rem;
        }

        .nav-left {
            font-weight: 500;
            cursor: pointer;
        }

        .article-header {
            margin-bottom: 2rem;
        }

        .article-title {
            font-size: 2.5rem;
            font-weight: 450;
            color: #2e3b32;
            letter-spacing: -0.02em;
            line-height: 1.2;
            margin-bottom: 1rem;
        }

        .article-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            color: #7b6b5c;
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #e4d9cf;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .article-image {
            width: 100%;
            max-height: 400px;
            border-radius: 1.5rem;
            overflow: hidden;
            margin-bottom: 2rem;
            background: #e7ddd2;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .article-image img {
            width: 100%;
            height: auto;
            object-fit: cover;
        }

        .article-content {
            color: #363f34;
            font-size: 1.1rem;
            line-height: 1.8;
        }

        .article-content p {
            margin-bottom: 1.5rem;
        }

        .article-content h2 {
            font-size: 1.8rem;
            font-weight: 450;
            color: #2e3b32;
            margin: 2rem 0 1rem;
        }

        .article-content h3 {
            font-size: 1.4rem;
            font-weight: 450;
            color: #2e3b32;
            margin: 1.5rem 0 1rem;
        }

        .article-content ul, .article-content ol {
            margin: 1rem 0 1.5rem 2rem;
        }

        .article-content li {
            margin-bottom: 0.5rem;
        }

        .article-content blockquote {
            border-left: 4px solid #b8a48f;
            padding: 1rem 0 1rem 2rem;
            margin: 1.5rem 0;
            font-style: italic;
            color: #5e6b53;
            background: rgba(180, 160, 140, 0.1);
            border-radius: 0 1rem 1rem 0;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: #7b6b5c;
        }

        .error {
            text-align: center;
            padding: 3rem;
            color: #b77c7c;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: #7b6b5c;
            text-decoration: none;
            font-size: 1rem;
            margin-bottom: 1rem;
            cursor: pointer;
        }

        .back-link:hover {
            color: #2e3b32;
        }

        .footer-note {
            text-align: center;
            margin-top: 2rem;
            color: #a49888;
            font-size: 0.85rem;
        }

        @media (max-width: 600px) {
            .article-title {
                font-size: 1.8rem;
            }
            
            .article-card {
                padding: 0.7rem;
            }
            
            .article-meta {
                flex-direction: column;
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>

<div class="article-card">
    <div class="nav-bar">
        <span class="nav-left" onclick="window.location.href='/app/profile.html'">мой путь</span>
        <span class="nav-left" onclick="window.location.href='/app/knowledge.html'"> база знаний</span>
    </div>

    <div id="articleContainer">
        <div class="loading">загрузка статьи...</div>
    </div>

    <div class="footer-note">
        знание&nbsp;&#183;&nbsp;это путь, а не цель
    </div>
</div>

<script>
    const token = localStorage.getItem('token');
    if (!token) {
        window.location.href = '/';
    }

    // Получаем ID статьи из URL
    const urlParams = new URLSearchParams(window.location.search);
    const articleId = urlParams.get('id');
    
    if (!articleId) {
        document.getElementById('articleContainer').innerHTML = '<div class="error">статья не найдена</div>';
    }

    async function apiRequest(url) {
        const response = await fetch('/api' + url, {
            headers: { 'Authorization': 'Bearer ' + token }
        });
        if (!response.ok) throw new Error(await response.text());
        return response.json();
    }

    function formatDate(dateString) {
        return new Date(dateString).toLocaleDateString('ru-RU', {
            year: 'numeric',
            month: 'long',
            day: 'numeric'
        });
    }

    function getCategoryName(category) {
        const categories = {
            'meditation': 'медитация',
            'yoga': 'йога',
            'mindfulness': 'осознанность',
            'nutrition': 'питание',
            'philosophy': 'философия'
        };
        return categories[category] || category;
    }

    async function loadArticle() {
        try {
            const article = await apiRequest('/articles/' + articleId);
            
            const hasImage = article.image_url && article.image_url.trim() !== '';
            const imageUrl = hasImage ? `/storage/${article.image_url}` : '';
            
            const container = document.getElementById('articleContainer');
            
            container.innerHTML = `
                <div class="article-header">
                    <h1 class="article-title">${article.title}</h1>
                    
                    <div class="article-meta">
                        <span class="meta-item"> ${formatDate(article.created_at)}</span>
                        <span class="meta-item"> ${article.read_time || 10} мин чтения</span>
                        <span class="meta-item"> ${getCategoryName(article.category)}</span>
                        ${article.difficulty ? `<span class="meta-item"> ${article.difficulty}</span>` : ''}
                        ${article.author ? `<span class="meta-item"> ${article.author}</span>` : ''}
                    </div>
                    
                    ${hasImage ? `
                        <div class="article-image">
                            <img src="${imageUrl}" alt="${article.title}">
                        </div>
                    ` : ''}
                </div>
                
                <div class="article-content">
                    ${article.content || 'нет текста'}
                </div>
            `;
            
        } catch (err) {
            console.error(err);
            document.getElementById('articleContainer').innerHTML = '<div class="error">ошибка загрузки статьи</div>';
        }
    }

    loadArticle();
</script>
</body>
</html>
