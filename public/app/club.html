    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f0ebe4;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.5;
            color: #2d342e;
            padding: 2rem 1rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .club-card {         
            width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15), inset 0 1px 2px rgba(255, 255, 255, 0.8);
            padding: 0 0 2rem 0;
            border: 1px solid rgba(255, 255, 255, 0.5);
            overflow: hidden;
        }

        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 1rem 2rem 0 2rem;
            color: #8d7f71;
          /*  border-bottom: 1px solid #e4d9cf;*/
            padding-bottom: 0.8rem;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
        }

        .nav-links span {
            cursor: pointer;
        }

        .user-section {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .logout-btn {
            background: #d8cdbf;
            border: none;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .club-cover {
            height: 200px;
            background: linear-gradient(145deg, #b8aa9a, #9a8b7a);
            margin: 0 2rem 1.5rem 2rem;
            border-radius: 1rem;
            display: flex;
            align-items: flex-end;
            padding: 1.5rem;
            position: relative;
            background-size: cover;
            background-blend-mode: overlay;
            overflow: hidden;
        }

        .club-cover-content {
            background: rgba(40, 35, 30, 0.3);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 2rem;
            padding: 1.2rem 2rem;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
            max-height: 120px;
          /*  overflow-y: auto;*/
        }

        .club-title h1 {
            font-size: 2.2rem;
            font-weight: 450;
            color: white;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
            line-height: 1.2;
            word-break: break-word;
            max-width: 80%;
        }

        .club-title p {
            color: rgba(255, 255, 240, 0.9);
            font-size: 0.95rem;
            word-break: break-word;
        }

        .join-btn {
            background: #d8cdbf;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 40px;
            /*font-size: 1rem;*/
            font-weight: 500;
            color: #2f3e32;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.6);
            transition: 0.2s;
        }

        .join-btn:hover {
            background: #c2b3a1;
        }

        .club-layout {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 2rem;
            padding: 0 2rem;
        }

        .club-main {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .club-sidebar {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .club-section {
            background: rgba(250, 245, 240, 0.5);
            border-radius: 1rem;
           
            border: 1px solid rgba(180, 160, 140, 0.15);
            backdrop-filter: blur(4px);

        .section-title {
            font-size: 1.3rem;
            font-weight: 450;
            color: #3f5142;
            margin-bottom: 1.2rem;
            padding: 1rem;w

            align-items: center;
            gap: 0.5rem;

        .club-tracker {

            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-bottom: 0.5rem;

        .tracker-stats {
            display: flex;
            justify-content: space-between;
            margin: 1rem 0;
        }

        .tracker-progress {
            background: #dbcfc1;
            height: 12px;
            border-radius: 20px;
            width: 100%;
            margin: 1rem 0;
        }

        .progress-fill {
            width: 68%;
            height: 12px;
            background: #7f9a6b;
            border-radius: 20px;
        }

        .member-miniatures {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .member-dot {

            height: 36px;

            border-radius: 50%;

            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            color: #4d3f32;
        }

        .club-post {
            background: white;
            border-radius: 1rem;
            margin-bottom: 0.5rem;
            border: 1px solid #ede3d8;
            position: relative;
        }

        .post-author {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 1rem;
            padding-left: 1rem;
            Padding-top: 1rem;

        .author-avatar {

            height: 40px;
            background: #cbb9a8;

            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            color: #4a3f35;
        }

        .author-name {
            font-weight: 500;
            color: #354334;
        }

        .post-time {
            font-size: 0.8rem;
            color: #8f7e6e;
        }

        .post-image {
            margin: 1rem 0;          
            background: #e8dfd5;
            max-height: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6b5f53;
            overflow: hidden;

        .post-image img {
            width: 100%;
            height: auto;
            max-height:500px;
            object-fit: contain;
        }

        .post-content {
            color: #363f34;
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 1rem;
            padding-left: 1rem;
        }

        .post-actions {
            display: flex;
            gap: 1.5rem;
            margin-top: 1rem;
            color: #7f7264;                   
            align-items: center;
            padding-left: 1rem;
            padding-bottom: 1rem;

        .post-actions span {

            align-items: center;
            gap: 0.3rem;
        }

        .menu-btn {

            cursor: pointer;
            padding: 0.2rem 0.5rem;
            border-radius: 0.5rem;
        }

        .post-menu {
            position: absolute;
            right: 1.5rem;
            top: 3rem;

            border-radius: 1rem;

        .post-menu-item {

       .member-avatar-small {

            border: 1px solid #d9cdc0;
            color: #3c483c;
        }

        .chat-send {
            background: #cdbcab;

            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 1.2rem;
            color: #2e3b2e;
            cursor: pointer;
        }

        .create-club-btn {
            background: #d8cdbf;
            border: none;

            border-radius: 2rem;

            margin-top: 0.5rem;

        .comments-section {

        }

            font-size: 0.9rem;
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.3rem;
        }

        .comment-author {
            font-weight: 600;
            color: #4a5a4a;
        }

        .comment-handle {
            font-size: 0.7rem;
            color: #9a8b7a;
            margin-left: 0.3rem;
        }

        .comment-date {
            font-size: 0.7rem;
            color: #9a8b7a;
        }

        .comment-delete {
            background: none;
            border: none;
            color: #b77c7c;
            cursor: pointer;
        }

        @media (max-width: 800px) {
            .club-layout {

                gap: 1rem;
            }
            .club-title h1 {

            }

/* ===== ГАМБУРГЕР МЕНЮ ===== */
.mobile-header {
    display: none;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    padding-bottom: 0.4rem;
    padding-left: 1rem;
    padding-right: 1rem;
    border-bottom: 1px solid #e4d9cf;
    margin-bottom: 1rem;
    color: #8d7f71; /* основной цвет */
}

.hamburger-icon {
    width: 30px;
    height: 20px;
    position: relative;
    cursor: pointer;
    z-index: 1001;
}

.hamburger-icon span {
    display: block;
    position: absolute;
    height: 1px;
    width: 100%;
    background: #8d7f71; /* цвет полосок */
    border-radius: 3px;
    transition: all 0.3s ease;
}

.hamburger-icon span:nth-child(1) { top: 0; }
.hamburger-icon span:nth-child(2) { top: 8px; }
.hamburger-icon span:nth-child(3) { top: 16px; }

.hamburger-icon.open span:nth-child(1) {
    transform: rotate(45deg);
    top: 8px;
}

.hamburger-icon.open span:nth-child(2) {
    opacity: 0;
}

.hamburger-icon.open span:nth-child(3) {
    transform: rotate(-45deg);
    top: 8px;
}

.menu-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.3);
    backdrop-filter: blur(3px);
    -webkit-backdrop-filter: blur(3px);
    z-index: 1000;
    opacity: 0;
    transition: opacity 0.3s ease;
}

.menu-overlay.show {
    display: block;
    opacity: 1;
}

.side-menu {
    position: fixed;
    top: 0;
    right: -300px;
    width: 280px;
    height: 100%;
    background: rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-left: 1px solid rgba(180, 160, 140, 0.2);
    z-index: 1001;
    transition: right 0.3s ease;
    padding: 2rem 1.5rem;
    pointer-events: none;
}

.side-menu.open {
    right: 0;
    pointer-events: auto;
}

.side-menu-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid #e4d9cf;
}

.menu-logo {
   /* font-size: 1.3rem;
    font-weight: 500;*/
    color: #8d7f71; /* одинаковый цвет с основным */
}

.menu-close {
    font-size: 1.3rem;
    cursor: pointer;
    color: #8d7f71;
    padding: 0.3rem 0.5rem;
    border-radius: 50%;
}

.menu-close:hover {
    background: rgba(180, 160, 140, 0.2);
}

.side-menu-items {
    display: flex;
    flex-direction: column;
    gap: 1rem;
}

.side-menu-items a {
    color: #8d7f71; /* теперь как в ПК-меню */
    text-decoration: none;
    font-size: 1.1rem;
    padding: 0.5rem 0;
    border-bottom: 1px solid rgba(180, 160, 140, 0.2);
    transition: all 0.2s;
}

.side-menu-items a:hover {
    color: #2e3b32; /* тёмно-зелёный при наведении */
    padding-left: 0.5rem;
}

.side-menu-items a.animate {
    transform: translateX(20px);
    opacity: 0;
    animation: slideIn 0.3s ease forwards;
}

@keyframes slideIn {
    to {
        transform: translateX(0);
        opacity: 1;
    }
}

/* Медиазапросы */
@media (max-width: 768px) {

 }

    async function loadComments(postId, page) {

        const postElement = document.querySelector(`.club-post[data-post-id="${postId}"]`);

            });

            const comments = data.data || data;
            const hasMore = data.next_page_url || (comments.length === 5);
            
            if (!commentsSection) {
                commentsSection = document.createElement('div');
                commentsSection.className = 'comments-section';
                postElement.appendChild(commentsSection);
            }

                commentsSection.innerHTML = '';
            }

                        <div class="comment-header">
                            <div>
                                <span class="comment-author">${c.user?.name || 'Пользователь'}</span>
                                <span class="comment-handle">@${c.user?.username || 'unknown'}</span>
                            </div>
                            <span class="comment-date">${new Date(c.created_at).toLocaleDateString()}</span>
                            ${c.user_id === currentUser.id ? `
                                <button class="comment-delete" onclick="deleteComment('${c.id}', '${postId}')">&#128465;</button>
                            ` : ''}
                        </div>
                        <div class="comment-text">${c.content}</div>
                    </div>
                `);
            });
            
            if (hasMore) {
                const showMoreBtn = document.createElement('button');
                showMoreBtn.textContent = 'показать ещё';
                showMoreBtn.style.cssText = 'background:transparent; border:1px solid #cbb9a8; padding:0.3rem 1rem; border-radius:2rem; margin:0.5rem 0; cursor:pointer;';
                showMoreBtn.onclick = () => {
                    commentsPage[postId]++;
                    loadComments(postId, commentsPage[postId]);
                    showMoreBtn.remove();
                };
                commentsSection.appendChild(showMoreBtn);
            }
            
            if (page === 1) {
                const formHtml = `
                    <div style="display:flex; gap:0.5rem; margin-top:1rem;">
                        <input type="text" id="comment-input-${postId}" 
                               placeholder="написать комментарий..." 
                               style="flex:1; padding:0.5rem; border-radius:2rem; border:1px solid #e0d3c5;">
                        <button onclick="addComment('${postId}')" style="background:#d8cdbf; border:none; padding:0.5rem 1rem; border-radius:2rem; cursor:pointer;">отправить</button>
                    </div>
                `;
                commentsSection.insertAdjacentHTML('beforeend', formHtml);
            }
            
        } catch (err) {
            console.error(err);
        }
    }

    async function addComment(postId) {
        const input = document.getElementById(`comment-input-${postId}`);
        const content = input.value.trim();
        if (!content) return;
        
        try {
            await apiRequest(`/clubs/posts/${postId}/comments`, {

            });
            
            input.value = '';
            const postElement = document.querySelector(`.club-post[data-post-id="${postId}"]`);
            const oldSection = postElement.querySelector('.comments-section');
            if (oldSection) oldSection.remove();
            
            commentsPage[postId] = 1;
            await loadComments(postId, 1);
            
            // Обновляем счётчик в посте
            const post = currentClub.posts.find(p => p.id === postId);
            if (post) {
                post.comments_count = (post.comments_count || 0) + 1;
                const commentSpan = document.querySelector(`[onclick="toggleComments('${postId}')"]`);
                if (commentSpan) {
                    commentSpan.innerHTML = `&#128172; ${post.comments_count}`;
                }
            }
            
        } catch (err) {
            alert('Ошибка');
        }
    }

    async function deleteComment(commentId, postId) {
        if (!confirm('Удалить комментарий?')) return;
        
        try {
            await apiRequest(`/comments/${commentId}`, { method: 'DELETE' });
            
            const post = currentClub.posts.find(p => p.id === postId);
            if (post) {
                post.comments_count = Math.max(0, (post.comments_count || 0) - 1);
                const commentSpan = document.querySelector(`[onclick="toggleComments('${postId}')"]`);
                if (commentSpan) {
                    commentSpan.innerHTML = `&#128172; ${post.comments_count}`;
                }
            }
            
            const postElement = document.querySelector(`.club-post[data-post-id="${postId}"]`);
            const oldSection = postElement.querySelector('.comments-section');
            if (oldSection) oldSection.remove();
            
            if (commentsPage[postId]) {
                commentsPage[postId] = 1;
                await loadComments(postId, 1);
            }
            
        } catch (err) {
            alert('Ошибка');
        }
    }

function openMenu() {

async function compressImage(file, maxWidth = 800, quality = 0.8) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (e) => {
            const img = new Image();
            img.src = e.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                let width = img.width;
                let height = img.height;
                
                if (width > maxWidth) {
                    height = Math.round(height * maxWidth / width);
                    width = maxWidth;
                }
                
                canvas.width = width;
                canvas.height = height;
                canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                
                canvas.toBlob((blob) => {
                    resolve(new File([blob], file.name, {
                        type: 'image/jpeg',
                        lastModified: Date.now()
                    }));
                }, 'image/jpeg', quality);
            };
            img.onerror = reject;
        };
        reader.onerror = reject;
    });
}

async function addClubComment(postId) {
    const input = document.getElementById(`club-comment-input-${postId}`);
    const content = input.value.trim();
    if (!content) return;
    
    try {
        await apiRequest(`/clubs/posts/${postId}/comments`, {
            method: 'POST',
            body: JSON.stringify({ content })
        });
        
        const post = currentClub.posts.find(p => p.id === postId);
        if (post) {
            post.comments_count = (post.comments_count || 0) + 1;
            const commentSpan = document.querySelector(`[onclick="toggleComments('${postId}')"]`);
            if (commentSpan) {
                commentSpan.innerHTML = `&#128172; ${post.comments_count}`;
            }
        }
        
        input.value = '';
        
        const postElement = document.querySelector(`.club-post[data-post-id="${postId}"]`);
        const oldSection = postElement.querySelector('.comments-section');
        if (oldSection) oldSection.remove();
        
        clubCommentsPage[postId] = 1;
        await loadClubComments(postId, 1);
        
    } catch (err) {
        alert('Ошибка');
    }
}

async function deleteClubComment(commentId, postId) {
    if (!confirm('Удалить комментарий?')) return;
    
    try {
        await apiRequest(`/comments/${commentId}`, { method: 'DELETE' });
        
        const post = currentClub.posts.find(p => p.id === postId);
        if (post) {
            post.comments_count = Math.max(0, (post.comments_count || 0) - 1);
            const commentSpan = document.querySelector(`[onclick="toggleComments('${postId}')"]`);
            if (commentSpan) {
                commentSpan.innerHTML = `&#128172; ${post.comments_count}`;
            }
        }
        
        const postElement = document.querySelector(`.club-post[data-post-id="${postId}"]`);
        const oldSection = postElement.querySelector('.comments-section');
        if (oldSection) oldSection.remove();
        
        if (clubCommentsPage[postId]) {
            clubCommentsPage[postId] = 1;
            await loadClubComments(postId, 1);
        }
        
    } catch (err) {
        alert('Ошибка');
    }
}

// Обработчик Enter для комментариев
document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && e.target.id && e.target.id.startsWith('club-comment-input-')) {
        e.preventDefault();
        const postId = e.target.id.replace('club-comment-input-', '');
        addClubComment(postId);
    }
});






async function toggleLike(postId, element) {
    try {
        const post = currentClub.posts.find(p => p.id === postId);
        if (!post) return;

        const method = post.liked_by_user ? 'DELETE' : 'POST';
        const url = post.liked_by_user ? `/clubs/posts/${postId}/unlike` : `/clubs/posts/${postId}/like`;

        await apiRequest(url, { method });

        post.liked_by_user = !post.liked_by_user;
        post.likes_count = (post.likes_count || 0) + (post.liked_by_user ? 1 : -1);

        element.innerHTML = `&#10084; ${post.likes_count}`;
        element.style.color = post.liked_by_user ? '#e25555' : '';

    } catch (err) {
        console.error('Ошибка лайка:', err);
    }
}
