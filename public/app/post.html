<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>новая запись</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f3efe8;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 2rem 1rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .form-card {
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 2.5rem;
            padding: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
        }

        .nav-bar {
            display: flex;
            align-items: center;
            margin-bottom: 2rem;
            color: #8d7f71;
            border-bottom: 1px solid #e4d9cf;
            padding-bottom: 0.8rem;
        }

        .back-link {
            font-weight: 500;
            cursor: pointer;
            color: #7b6b5c;
        }

        .back-link:hover {
            color: #5e6b53;
        }

        h2 {
            font-size: 1.8rem;
            font-weight: 450;
            color: #2e3b32;
            margin-bottom: 2rem;
            letter-spacing: -0.02em;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        textarea {
            width: 100%;
            min-height: 200px;
            padding: 1rem 1.2rem;
            border-radius: 1.5rem;
            border: 1px solid #e0d3c5;
            background: rgba(255, 255, 255, 0.9);
            font-family: inherit;
            font-size: 1rem;
            color: #2a2f2b;
            outline: none;
            resize: vertical;
            transition: all 0.2s;
        }

        textarea:focus {
            border-color: #b8a48f;
            box-shadow: 0 0 0 3px rgba(180, 160, 140, 0.15);
        }

        /* Загрузка фото */
        .photo-upload {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .photo-preview {
            width: 80px;
            height: 80px;
            border-radius: 1rem;
            background: #e7ddd2;
            border: 1px solid #cbb9a8;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .photo-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .photo-btn {
            background: #d8cdbf;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.9rem;
            color: #2f3e32;
            border: 1px solid rgba(255,255,255,0.6);
        }

        /* Выбор видимости */
        .privacy-selector {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            background: rgba(230, 220, 210, 0.3);
            border-radius: 2rem;
            padding: 0.5rem;
        }

        .privacy-option {
            flex: 1;
            text-align: center;
            padding: 0.6rem;
            border-radius: 2rem;
            cursor: pointer;
            color: #5e6b53;
            transition: all 0.2s;
        }

        .privacy-option.active {
            background: #b8a48f;
            color: #2e3b2e;
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .btn {
            flex: 1;
            background: #d8cdbf;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 3rem;
            font-size: 1rem;
            color: #2f3e32;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.6);
            transition: all 0.2s;
        }

        .btn:hover {
            background: #c2b3a1;
        }

        .btn-secondary {
            background: #f0ebe4;
        }

        .btn-secondary:hover {
            background: #e5dbd1;
        }

        .footer-note {
            text-align: center;
            margin-top: 2rem;
            color: #a49888;
            font-size: 0.85rem;
        }

        @media (max-width: 500px) {
            .form-card {
                padding: 1.5rem;
            }
            
            h2 {
                font-size: 1.5rem;
            }
            
            .btn-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="form-card">
        <div class="nav-bar">
            <span class="back-link" onclick="window.location.href='/app/profile.html'"> мой путь</span>
        </div>

        <h2>новая запись</h2>

        <div class="form-group">
            <textarea id="content" placeholder="поделиться мыслью..."></textarea>
        </div>

        <!-- Загрузка фото -->
        <div class="photo-upload">
            <div class="photo-preview" id="photoPreview">
                <span></span>
            </div>
            <input type="file" id="photoUpload" accept="image/*" style="display:none;">
            <button type="button" class="photo-btn" onclick="document.getElementById('photoUpload').click()">добавить фото</button>
        </div>

        <!-- Выбор видимости -->
        <div class="privacy-selector">
            <div class="privacy-option active" onclick="selectPrivacy('private')">только я</div>
            <div class="privacy-option" onclick="selectPrivacy('friends')">друзья</div>
            <div class="privacy-option" onclick="selectPrivacy('public')">все</div>
        </div>

        <div class="btn-group">
            <button class="btn" onclick="savePost()">опубликовать</button>
            <button class="btn btn-secondary" onclick="window.location.href='/app/profile.html'">отмена</button>
        </div>

        <div class="footer-note">
            каждый день  шаг на пути
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = '/';
        }

        let selectedPrivacy = 'private';
        let selectedPhoto = null;

        function selectPrivacy(privacy) {
            selectedPrivacy = privacy;
            document.querySelectorAll('.privacy-option').forEach(opt => {
                opt.classList.remove('active');
            });
            event.target.classList.add('active');
        }

        document.getElementById('photoUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                selectedPhoto = file;
                const reader = new FileReader();
                reader.onload = function(e) {
                    const preview = document.getElementById('photoPreview');
                    preview.innerHTML = `<img src="${e.target.result}" style="width:100%; height:100%; object-fit:cover;">`;
                };
                reader.readAsDataURL(file);
            }
        });

        async function compressImage(file, maxWidth = 800, quality = 0.8) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        
                        if (width > maxWidth) {
                            height = Math.round(height * maxWidth / width);
                            width = maxWidth;
                        }
                        
                        canvas.width = width;
                        canvas.height = height;
                        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                        
                        canvas.toBlob((blob) => {
                            resolve(new File([blob], file.name, {
                                type: 'image/jpeg',
                                lastModified: Date.now()
                            }));
                        }, 'image/jpeg', quality);
                    };
                    img.onerror = reject;
                };
                reader.onerror = reject;
            });
        }

        async function savePost() {
            const content = document.getElementById('content').value.trim();
            if (!content) {
                alert('введите текст');
                return;
            }

            try {
                let formData = new FormData();
                formData.append('content', content);
                formData.append('privacy', selectedPrivacy);
                
                if (selectedPhoto) {
                    const compressedPhoto = await compressImage(selectedPhoto, 800, 0.8);
                    formData.append('photo', compressedPhoto);
                }

                const response = await fetch('/api/posts', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + token
                    },
                    body: formData
                });
                
                if (response.ok) {
                    window.location.href = '/app/profile.html';
                } else {
                    const error = await response.text();
                    alert('Ошибка: ' + error);
                }
            } catch (err) {
                alert('Ошибка соединения');
            }
        }
    </script>
</body>
</html>
