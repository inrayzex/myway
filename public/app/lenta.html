<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Путь  Лента</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f0ebe4;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.5;
            color: #2d342e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .feed-card {
            width: 1200px;
           /* width: 100%;*/
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15), inset 0 1px 2px rgba(255, 255, 255, 0.8);
            padding: 0 0 2rem 0;
            border: 1px solid rgba(255, 255, 255, 0.5);
            overflow: hidden;
        }

        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 1rem 2rem 0 2rem;
            color: #8d7f71;
            border-bottom: 1px solid #e4d9cf;
            padding-bottom: 0.8rem;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
        }

        .nav-links span {
            cursor: pointer;
        }

        .nav-links .active {
            border-bottom: 2px solid #a48e78;
            padding-bottom: 0.2rem;
        }

        .user-section {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .logout-btn {
            background: #d8cdbf;
            border: none;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.9rem;
            color: #2f3e32;
            border: 1px solid rgba(255,255,255,0.6);
        }

        .feed-layout {
            display: grid;
            grid-template-columns: 1fr 280px;
            gap: 2rem;
            padding: 2rem;
        }

        .feed-main {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .feed-sidebar {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .feed-filters {
            display: flex;
            gap: 0.5rem;
            background: rgba(230, 220, 210, 0.4);
            border-radius: 40px;
            padding: 0.3rem;
            width: fit-content;
        }

        .filter-btn {
            background: transparent;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            font-size: 0.9rem;
            color: #5a6557;
            cursor: pointer;
        }

        .filter-btn.active {
            background: #d8cdbf;
            color: #2e3f33;
        }

        .post-card {
            background: white;
            border-radius: 1rem;
           /* padding: 1.5rem;*/
            border: 1px solid #ede3d8;
            box-shadow: 0 5px 15px rgba(0,0,0,0.02);
            position: relative;
        }

        .post-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.2rem;
            padding-top: 1rem;
            padding-left: 1rem;
        }

        .post-avatar {
            width: 50px;
            height: 50px;
            background: #cbb9a8;
            border-radius: 50%;

            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            color: #4d3b2c;
            border: 2px solid white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            flex-shrink: 0;
        }

        .post-author {
            font-weight: 500;
            color: #2f4033;
            font-size: 1.1rem;
        }

        .post-meta {
            display: flex;
            gap: 1rem;
            color: #8f7e6e;
            font-size: 0.85rem;
            margin-top: 0.2rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .privacy-badge {
            background: #e7ddd2;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-size: 0.75rem;
            color: #5f4c3b;
        }

        .post-content {

            line-height: 1.6;

            padding-left: 1rem;

        .post-image {
    margin: 1rem 0;
   /* border-radius: 1.2rem;*/

    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

.post-image img {
    width: 100%;
    height: auto;        
    max-height: 500px;   
    object-fit: contain; 
}

        .post-actions {

            margin-top: 1rem;
            color: #7f7264;
            padding: 1rem;
            align-items: center;
        }

        .post-actions span {

            gap: 0.3rem;
            cursor: pointer;
        }

        .menu-btn {
            margin-left: auto;
            font-size: 1.2rem;

            padding: 0.2rem 1rem;
            border-radius: 0.5rem;
            position: relative;
        }

        .menu-btn:hover {
            background: #f0e8e0;
        }

       .post-menu {

    top: 100%;  /* Это значит - сразу под кнопкой */
    right: 0;
    margin-top: 5px; /* небольшой отступ */

    border-radius: 1rem;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);

}
        .post-menu-item {

            border-radius: 1rem;

            align-items: center;

        }

        .club-info h4 {
            font-weight: 500;
            color: #354334;
        }

        .club-info p {
            font-size: 0.8rem;
            color: #7b6b5c;
        }

        .suggested-user {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 1rem;
        }

        .suggested-avatar {
            width: 40px;
            height: 40px;
            background: #b7a48f;
            border-radius: 50%;
        }

        .suggested-name {
            flex: 1;
            font-weight: 500;
            color: #2f4033;
        }

        .follow-btn {
            background: #e7ddd2;
            border: none;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-size: 0.8rem;
            color: #3d4a40;

        .comments-section {

            border-top: 2px dashed #e0d3c5;
        }

        .comment-item {
            background: #f8f4f0;
            border-radius: 1rem;
            padding: 0.8rem 1rem;
            margin-bottom: 0.8rem;
            margin-left: 1.5rem;
            border: 1px solid #ede3d8;
            position: relative;
        }

        .comment-item::before {
            content: '';
            position: absolute;
            left: -1rem;
            top: 1rem;
            width: 0.8rem;
            height: 1px;
            background: #e0d3c5;
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.3rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .comment-author {
            font-weight: 600;
            color: #4a5a4a;
            font-size: 0.9rem;
        }

        .comment-handle {
            font-size: 0.7rem;
            color: #9a8b7a;
            margin-left: 0.3rem;
        }

        .comment-date {
            font-size: 0.7rem;
            color: #9a8b7a;
        }

        .comment-text {
            color: #2f4033;
            font-size: 0.95rem;
            line-height: 1.4;
            word-break: break-word;
        }

        .comment-delete {
            background: none;
            border: none;
            color: #b77c7c;
            cursor: pointer;
            font-size: 1rem;
            padding: 0.2rem 0.5rem;
            border-radius: 0.5rem;

        .comment-delete:hover {

        }

        .show-more-btn {
            background: transparent;
            border: 1px solid #cbb9a8;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            font-size: 0.85rem;
            color: #5e6b53;
            cursor: pointer;
            margin: 0.5rem 0 1rem 1.5rem;

        }

        .show-more-btn:hover {

        }

        .loader {

            padding: 2rem;
            color: #7b6b5c;
        }

        .no-posts {
            text-align: center;
            padding: 2rem;
            color: #7b6b5c;
            font-style: italic;
        }

      @media (max-width: 750px) {
            .feed-layout {
                grid-template-columns: 1fr;
                padding:0rem;
            }
            .nav-bar {
                margin: 1rem 1rem 0 1rem;

            }

/* ===== ГАМБУРГЕР МЕНЮ ===== */
.mobile-header {
    color: #8d7f71;
    display: none;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    padding-bottom:0.4rem;
    padding-left:1rem;
    padding-right:1rem; 
    border-bottom: 1px solid #e4d9cf;
    margin-bottom: 1rem;
}

.hamburger-icon {
    width: 30px;
    height: 20px;
    position: relative;
    cursor: pointer;
    z-index: 1001;
}

.hamburger-icon span {
    color: #8d7f71;
    display: block;
    position: absolute;
    height: 1px;
    width: 100%;
    background: #8d7f71;
    border-radius: 3px;
    transition: all 0.3s ease;
}

.hamburger-icon span:nth-child(1) { top: 0; }
.hamburger-icon span:nth-child(2) { top: 8px; }
.hamburger-icon span:nth-child(3) { top: 16px; }

.hamburger-icon.open span:nth-child(1) {
    transform: rotate(45deg);
    top: 8px;
}

.hamburger-icon.open span:nth-child(2) {
    opacity: 0;
}

.hamburger-icon.open span:nth-child(3) {
    transform: rotate(-45deg);
    top: 8px;
}

.menu-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.3);
    backdrop-filter: blur(3px);
    -webkit-backdrop-filter: blur(3px);
    z-index: 1000;
    opacity: 0;
    transition: opacity 0.3s ease;
}

.menu-overlay.show {
    display: block;
    opacity: 1;
}

.side-menu {
    position: fixed;
    top: 0;
    right: -300px;
    width: 280px;
    height: 100%;
    background: rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-left: 1px solid rgba(180, 160, 140, 0.2);
    z-index: 1001;
    transition: right 0.3s ease;
    padding: 2rem 1.5rem;
    pointer-events: none;
}

.side-menu.open {
    right: 0;
    pointer-events: auto;
}

.side-menu-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid #e4d9cf;
}

.menu-logo {
 /*   font-size: 1.3rem;
    font-weight: 500;*/
    color: #2e3b32;
}

.menu-close {
    font-size: 1.3rem;
    cursor: pointer;
    color: #8d7f71;
    padding: 0.3rem 0.5rem;
    border-radius: 50%;
}

.side-menu-items {
    display: flex;
    flex-direction: column;
    gap: 1rem;
}

.side-menu-items a {
    color: #5e6b53;
    text-decoration: none;
    font-size: 1.1rem;
    padding: 0.5rem 0;
    border-bottom: 1px solid rgba(180, 160, 140, 0.2);
    transition: all 0.2s;
}

.side-menu-items a:hover {
    color: #2e3b32;
    padding-left: 0.5rem;
}

.side-menu-items a.animate {
    transform: translateX(20px);
    opacity: 0;
    animation: slideIn 0.3s ease forwards;
}

@keyframes slideIn {
    to {
        transform: translateX(0);
        opacity: 1;
    }
}

/* Медиазапросы */
@media (max-width: 768px) {
    .nav-bar {

<script>
    const token = localStorage.getItem('token');
    if (!token) {
        window.location.href = '/';
    }

    function logout() {
        localStorage.removeItem('token');
        window.location.href = '/';
    }

    let allPosts = [];
    let currentFilter = 'all';
    let currentUser = null;
    let commentsPage = {};

    async function apiRequest(url, options = {}) {
        const headers = {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token,
            ...options.headers
        };
        const response = await fetch('/api' + url, { ...options, headers });
        if (!response.ok) throw new Error(await response.text());
        return response.json();
    }






async function loadFeed() {
    try {
        currentUser = await apiRequest('/user');
        
        const posts = await apiRequest('/posts');
        allPosts = posts.data || posts;
        
        let feedPosts = [];
        
        if (currentFilter === 'all') {
            // Все посты, кроме своих private
            feedPosts = allPosts.filter(post => {
                if (post.user_id === currentUser.id) return post.privacy !== 'private';
                return post.privacy === 'public' || (post.is_friend && post.privacy === 'friends');
            });
        } else if (currentFilter === 'friends') {
            // Только посты друзей (с privacy = friends или public)
            feedPosts = allPosts.filter(post => 
                post.is_friend && (post.privacy === 'friends' || post.privacy === 'public')
            );
        } else if (currentFilter === 'clubs') {
            // Пока заглушка  потом посты из клубов
            feedPosts = [];
        }
        
        renderPosts(feedPosts);

        const users = await apiRequest('/users/suggestions');
        renderSuggested(users);

        const clubs = await apiRequest('/clubs?limit=3');
        renderClubs(clubs);

        const practicing = await apiRequest('/practices/active-users');
        renderPracticing(practicing);
    } catch (err) {
        console.error(err);
        document.getElementById('postsContainer').innerHTML = '<div class="no-posts">ошибка загрузки</div>';
    }
}






    function renderPosts(posts) {
        const container = document.getElementById('postsContainer');
        container.innerHTML = '';

        if (posts.length === 0) {
            container.innerHTML = '<div class="no-posts">пока нет записей</div>';
            return;
        }

        const sortedPosts = [...posts].sort((a, b) => 
            new Date(b.created_at) - new Date(a.created_at)
        );

        sortedPosts.slice(0, 20).forEach(post => {
            const privacyText = {
                'private': ' только я',
                'friends': ' друзья',
                'public': ' все'
            }[post.privacy] || '';
         

   container.insertAdjacentHTML('beforeend', `
                <div class="post-card" data-post-id="${post.id}">
                    <div class="post-header">
                        
<div class="post-avatar">
    ${post.user?.avatar_url 
        ? `<img src="/storage/${post.user.avatar_url}" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">` 
        : (post.user?.name?.charAt(0) || '?')}
</div>



                        <div>
                            <div class="post-author">${post.user?.name || 'Пользователь'}</div>
                            <div class="post-meta">
                                <span>${new Date(post.created_at).toLocaleDateString()}</span>
                                <span class="privacy-badge">${privacyText}</span>
                            </div>
                        </div>


                ${post.user_id === currentUser.id ? `
                            <span class="menu-btn" onclick="togglePostMenu('${post.id}', event)">&#8942;</span>
                        ` : ''}




                    </div>
                    <div class="post-content">${post.content}</div>
                    ${post.photo_url ? `
                    <div class="post-image">
                        <img src="/storage/${post.photo_url}" alt="post image">
                    </div>
                    ` : ''}
                    <div class="post-actions">
                        <span onclick="toggleLike('${post.id}', this)" 
                              style="cursor: pointer; ${post.liked_by_user ? 'color: #e25555;' : ''}">
                            &#10084; ${post.likes_count || 0}
                        </span>
                        <span onclick="toggleComments('${post.id}')" style="cursor: pointer;">
                            &#128172; ${post.comments_count || 0}
                        </span>
                        

                  <!--   ${post.user_id === currentUser.id ? `
                            <span class="menu-btn" onclick="togglePostMenu('${post.id}', event)">&#8942;</span>
                        ` : ''}  -->

                    </div>


                   ${post.user_id === currentUser.id ? `
                    <div class="post-menu" id="menu-${post.id}" style="display: none;">                   
                        <div class="post-menu-item" onclick="sharePost('${post.id}')">
                            <span>&#128279;</span> поделиться ссылкой
                        </div>
                        <div class="post-menu-item delete" onclick="deletePost('${post.id}')">
                            <span>&#128465;</span> удалить
                        </div>
                    </div>
                    ` : ''}   


 
                </div>
            `);
        });
    }  








    async function toggleLike(postId, element) {
        try {
            const post = allPosts.find(p => p.id === postId);
            if (!post) return;

            const method = post.liked_by_user ? 'DELETE' : 'POST';
            const url = post.liked_by_user ? `/posts/${postId}/unlike` : `/posts/${postId}/like`;
            
            await apiRequest(url, { method });
            
            post.liked_by_user = !post.liked_by_user;
            
            if (post.liked_by_user) {
                post.likes_count = (post.likes_count || 0) + 1;
            } else {
                post.likes_count = Math.max(0, (post.likes_count || 0) - 1);
            }
            
            const likeSpan = element;
            likeSpan.innerHTML = `&#10084; ${post.likes_count}`;
            likeSpan.style.color = post.liked_by_user ? '#e25555' : '';
            
        } catch (err) {
            console.error('Ошибка лайка:', err);
            alert('Не удалось поставить лайк');
        }
    }

    function togglePostMenu(postId, event) {
        event.stopPropagation();
        
        document.querySelectorAll('.post-menu').forEach(menu => {
            if (menu.id !== `menu-${postId}`) {
                menu.style.display = 'none';
            }
        });
        
        const menu = document.getElementById(`menu-${postId}`);
        if (menu) {
            menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
        }
    }

    function sharePost(postId) {
        const url = window.location.origin + '/app/view_post.html?id=' + postId;
        
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(url).then(() => {
                alert('Ссылка скопирована');
                document.getElementById(`menu-${postId}`).style.display = 'none';
            }).catch(() => {
                fallbackCopy(url, postId);
            });
        } else {
            fallbackCopy(url, postId);
        }
    }

    function fallbackCopy(text, postId) {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.style.position = 'fixed';
        textarea.style.opacity = '0';
        document.body.appendChild(textarea);
        textarea.select();
        
        try {
            document.execCommand('copy');
            alert('Ссылка скопирована');
        } catch (err) {
            alert('Не удалось скопировать ссылку');
        }
        
        document.body.removeChild(textarea);
        document.getElementById(`menu-${postId}`).style.display = 'none';
    }

    async function deletePost(postId) {
        if (!confirm('Удалить запись?')) return;
        
        try {
            await apiRequest(`/posts/${postId}`, { method: 'DELETE' });
            loadFeed();
        } catch (err) {
            alert('Ошибка удаления');
        }
    }

    function renderSuggested(users) {
        const container = document.getElementById('suggestedContainer');
        container.innerHTML = '';
        
        let usersArray = users;
        if (users && !Array.isArray(users)) {
            if (users.data && Array.isArray(users.data)) {
                usersArray = users.data;
            } else {
                usersArray = [];
            }
        }
        
        if (!usersArray || usersArray.length === 0) {
            container.innerHTML = '<div class="suggested-user">Нет рекомендаций</div>';
            return;
        }
        
        usersArray.slice(0, 3).forEach(user => {
            const btnText = user.is_following ? 'отп.' : 'подп.';
            container.insertAdjacentHTML('beforeend', `
                <div class="suggested-user">
                    <div class="suggested-avatar"></div>
                    <div class="suggested-name">${user.name}</div>
                    <button class="follow-btn" onclick="toggleFollow('${user.id}', this)">${btnText}</button>
                </div>
            `);
        });
    }

    async function toggleFollow(userId, btn) {
        try {
            if (btn.textContent === 'подп.') {
                await apiRequest('/users/' + userId + '/follow', { method: 'POST' });
                btn.textContent = 'отп.';
            } else {
                await apiRequest('/users/' + userId + '/unfollow', { method: 'DELETE' });
                btn.textContent = 'подп.';
            }
        } catch (err) {
            alert('Ошибка');
        }
    }

    function filterPosts(filter) {
        currentFilter = filter;
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        loadFeed();
    }

    async function toggleComments(postId) {
        const postElement = document.querySelector(`.post-card[data-post-id="${postId}"]`);
        if (!postElement) return;
        
        let commentsSection = postElement.querySelector('.comments-section');
        
        if (commentsSection) {
            commentsSection.remove();
            delete commentsPage[postId];
            return;
        }
        
        commentsPage[postId] = 1;
        await loadComments(postId, 1);
    }

    async function loadComments(postId, page) {
        const postElement = document.querySelector(`.post-card[data-post-id="${postId}"]`);
        if (!postElement) return;
        
        let commentsSection = postElement.querySelector('.comments-section');
        
        try {
            const response = await fetch(`/api/posts/${postId}/comments?page=${page}&limit=10`, {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const data = await response.json();
            const comments = data.data || data;
            const hasMore = data.next_page_url || (comments.length === 10);
            
            if (!commentsSection) {
                commentsSection = document.createElement('div');
                commentsSection.className = 'comments-section';
                postElement.appendChild(commentsSection);
            }
            
            if (page === 1) {
                commentsSection.innerHTML = '';
            }
            
            comments.forEach(c => {
                commentsSection.insertAdjacentHTML('beforeend', `
                    <div class="comment-item">
                        <div class="comment-header">
                            <div>
                                <span class="comment-author">${c.user?.name || 'Пользователь'}</span>
                                <span class="comment-handle">@${c.user?.username || 'unknown'}</span>
                            </div>
                            <span class="comment-date">${new Date(c.created_at).toLocaleDateString()}</span>
                            ${c.user_id === currentUser.id ? `
                                <button class="comment-delete" onclick="deleteComment('${c.id}', '${postId}')">&#128465;</button>
                            ` : ''}
                        </div>
                        <div class="comment-text">${c.content}</div>
                    </div>
                `);
            });
            
            if (hasMore) {
                const showMoreBtn = document.createElement('button');
                showMoreBtn.className = 'show-more-btn';
                showMoreBtn.textContent = 'показать ещё';
                showMoreBtn.onclick = () => {
                    commentsPage[postId]++;
                    loadComments(postId, commentsPage[postId]);
                    showMoreBtn.remove();
                };
                commentsSection.appendChild(showMoreBtn);
            }
            
            if (page === 1 || !document.getElementById(`comment-input-${postId}`)) {
                const formHtml = `
                    <div style="display: flex; gap: 0.5rem;">
                        <input type="text" id="comment-input-${postId}" 
                               placeholder="написать комментарий... (Enter для отправки)" 
                               style="flex:1; padding: 0.8rem 1rem; border-radius: 1rem; border: 1px solid #e0d3c5; background: white;">
                        <button onclick="addComment('${postId}')" 
                                style="background: #d8cdbf; border: none; padding: 0.8rem 1.5rem; border-radius: 2rem; cursor: pointer;">отправить</button>
                    </div>
                `;
                commentsSection.insertAdjacentHTML('beforeend', formHtml);
            }
            
        } catch (err) {
            console.error('Ошибка загрузки комментариев:', err);
        }
    }

    async function addComment(postId) {
        const input = document.getElementById(`comment-input-${postId}`);
        const content = input.value.trim();
        if (!content) return;
        
        try {
            await apiRequest(`/posts/${postId}/comments`, {
                method: 'POST',
                body: JSON.stringify({ content })
            });
            
            const post = allPosts.find(p => p.id === postId);
            if (post) {
                post.comments_count = (post.comments_count || 0) + 1;
                const commentSpan = document.querySelector(`[onclick="toggleComments('${postId}')"]`);
                if (commentSpan) {
                    commentSpan.innerHTML = `&#128172; ${post.comments_count}`;
                }
            }
            
            input.value = '';
            
            const postElement = document.querySelector(`.post-card[data-post-id="${postId}"]`);
            const oldSection = postElement.querySelector('.comments-section');
            if (oldSection) oldSection.remove();
            
            commentsPage[postId] = 1;
            await loadComments(postId, 1);
            
        } catch (err) {
            alert('Ошибка');
        }
    }

    async function deleteComment(commentId, postId) {
        if (!confirm('Удалить комментарий?')) return;
        
        try {
            await apiRequest(`/comments/${commentId}`, { method: 'DELETE' });
            
            const post = allPosts.find(p => p.id === postId);
            if (post) {
                post.comments_count = Math.max(0, (post.comments_count || 0) - 1);
                const commentSpan = document.querySelector(`[onclick="toggleComments('${postId}')"]`);
                if (commentSpan) {
                    commentSpan.innerHTML = `&#128172; ${post.comments_count}`;
                }
            }
            
            const postElement = document.querySelector(`.post-card[data-post-id="${postId}"]`);
            const oldSection = postElement.querySelector('.comments-section');
            if (oldSection) oldSection.remove();
            
            if (commentsPage[postId]) {
                commentsPage[postId] = 1;
                await loadComments(postId, 1);
            }
            
        } catch (err) {
            alert('Ошибка');
        }
    }

    // Обработчик Enter для комментариев
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && e.target.id && e.target.id.startsWith('comment-input-')) {
            e.preventDefault();
            const postId = e.target.id.replace('comment-input-', '');
            addComment(postId);
        }
    });

    document.addEventListener('click', function() {
        document.querySelectorAll('.post-menu').forEach(menu => {
            menu.style.display = 'none';
        });
    });







// ===== ГАМБУРГЕР МЕНЮ =====
const hamburger = document.getElementById('hamburgerBtn');
const sideMenu = document.getElementById('sideMenu');
const overlay = document.getElementById('menuOverlay');
const closeBtn = document.getElementById('closeMenuBtn');

function openMenu() {
    sideMenu.classList.add('open');
    overlay.classList.add('show');
    hamburger.classList.add('open');
    
    // Анимация ссылок
    const links = document.querySelectorAll('.side-menu-items a');
    links.forEach(link => {
        link.classList.remove('animate');
        void link.offsetWidth; // форсируем перерисовку
        link.classList.add('animate');
    });
}

function closeMenu() {
    sideMenu.classList.remove('open');
    overlay.classList.remove('show');
    hamburger.classList.remove('open');
    
    const links = document.querySelectorAll('.side-menu-items a');
    links.forEach(link => {
        link.classList.remove('animate');
    });
}

hamburger.addEventListener('click', function() {
    if (sideMenu.classList.contains('open')) {
        closeMenu();
    } else {
        openMenu();
    }
});

closeBtn.addEventListener('click', closeMenu);
overlay.addEventListener('click', closeMenu);

document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && sideMenu.classList.contains('open')) {
        closeMenu();
    }
});
