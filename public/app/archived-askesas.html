<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Путь  завершённые аскезы</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f3efe8;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.5;
            color: #2a2f2b;
            padding: 2rem 1rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .archive-card {
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 2.5rem;
            padding: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            color: #8d7f71;
            border-bottom: 1px solid #e4d9cf;
            padding-bottom: 0.8rem;
        }

        .nav-left {
            font-weight: 500;
            cursor: pointer;
            color: #7b6b5c;
        }

        .archive-header {
            margin-bottom: 2rem;
        }

        .archive-header h1 {
            font-size: 2rem;
            font-weight: 450;
            color: #2e3b32;
            margin-bottom: 0.5rem;
        }

        .archive-header p {
            color: #7b6b5c;
        }

        .archive-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .archive-item {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid #e0d3c5;
            border-radius: 1.5rem;
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .archive-item:hover {
            background: rgba(255, 255, 255, 0.8);
            border-color: #b8a48f;
        }

        .archive-item-info h3 {
            font-size: 1.2rem;
            font-weight: 500;
            color: #2e3b32;
            margin-bottom: 0.3rem;
        }

        .archive-item-info p {
            color: #7b6b5c;
            font-size: 0.9rem;
        }

        .archive-item-date {
            color: #7b6b5c;
            font-size: 0.9rem;
            text-align: right;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #7b6b5c;
            font-style: italic;
        }

        .footer-note {
            text-align: center;
            margin-top: 2rem;
            color: #a49888;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

<div class="archive-card">
    <div class="nav-bar">
        <span class="nav-left" onclick="window.location.href='/app/profile.html'"> мой путь</span>
    </div>

    <div class="archive-header">
        <h1>завершённые аскезы</h1>
        <p>достижения, которые остались в прошлом</p>
    </div>

    <div id="archiveList" class="archive-list">
        <div class="empty-state">загрузка...</div>
    </div>

    <div class="footer-note">
        каждый день &#183; шаг на пути
    </div>
</div>

<script>
    const token = localStorage.getItem('token');
    if (!token) {
        window.location.href = '/';
    }

    async function apiRequest(url, options = {}) {
        const headers = {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token,
            ...options.headers
        };
        const response = await fetch('/api' + url, { ...options, headers });
        if (!response.ok) throw new Error(await response.text());
        return response.json();
    }

    async function loadArchivedAskesas() {
        try {
            // Получаем все практики
            const practices = await apiRequest('/practices');
            
            // Фильтруем завершённые аскезы
            const archived = practices.filter(p => p.goal_days && p.completed_at);
            
            // Сортируем по дате завершения (сначала новые)
            archived.sort((a, b) => new Date(b.completed_at) - new Date(a.completed_at));
            
            renderArchived(archived);
        } catch (err) {
            document.getElementById('archiveList').innerHTML = '<div class="empty-state">ошибка загрузки</div>';
        }
    }

    function renderArchived(askesas) {
        const container = document.getElementById('archiveList');
        
        if (askesas.length === 0) {
            container.innerHTML = '<div class="empty-state">пока нет завершённых аскез</div>';
            return;
        }

        container.innerHTML = askesas.map(a => {
            const completed = a.logs?.length || a.goal_days;
            const completedDate = new Date(a.completed_at).toLocaleDateString();
            
            return `
                <div class="archive-item" onclick="window.location.href='/app/practice-view.html?id=${a.id}'">
                    <div class="archive-item-info">
                        <h3>${a.name}</h3>
                        <p>${completed} дней  ${a.goal_unit || 'практика'}</p>
                    </div>
                    <div class="archive-item-date">
                        завершено<br>${completedDate}
                    </div>
                </div>
            `;
        }).join('');
    }

    loadArchivedAskesas();
</script>
</body>
</html>
