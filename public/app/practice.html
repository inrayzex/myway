<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Путь&nbsp;&#183;&nbsp;новая практика</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f0ebe4;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.5;
            color: #2d342e;
            padding: 2rem 1rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .form-card {
            max-width: 700px;
            width: 100%;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15), inset 0 1px 2px rgba(255, 255, 255, 0.8);
            padding: 0 0 2rem 0;
            border: 1px solid rgba(255, 255, 255, 0.5);
            overflow: hidden;
        }

        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 1rem 2rem 0 2rem;
            color: #8d7f71;
            border-bottom: 1px solid #e4d9cf;
            padding-bottom: 0.8rem;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
        }

        .form-header {
            margin: 2rem 2rem 1rem 2rem;
        }

        .form-header h1 {
            font-size: 2rem;
            font-weight: 450;
            color: #2e3b32;
            letter-spacing: -0.02em;
            margin-bottom: 0.3rem;
        }

        .form-header p {
            color: #6b6258;
        }

        .practice-form {
            padding: 0 2rem;
        }

        .form-group {
            margin-bottom: 1.8rem;
        }

        .form-label {
            display: block;
            font-size: 0.9rem;
            color: #5e6b53;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid #e0d3c5;
            border-radius: 60px;
            padding: 0.9rem 1.2rem;
            font-size: 1rem;
            color: #2d342e;
            outline: none;
            transition: 0.2s;
        }

        .form-input:focus {
            border-color: #b8a48f;
            box-shadow: 0 0 0 3px rgba(180, 160, 140, 0.2);
        }

        .radio-group {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem 2rem;
            background: rgba(230, 220, 210, 0.3);
            border-radius: 2rem;
            padding: 1.2rem 1.5rem;
        }

        .radio-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .radio-item input[type="radio"] {
            width: 18px;
            height: 18px;
            accent-color: #7f9a6b;
        }

        .goal-row {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .goal-input {
            flex: 1;
            min-width: 100px;
            background: rgba(255,255,255,0.8);
            border: 1px solid #e0d3c5;
            border-radius: 40px;
            padding: 0.8rem 1rem;
        }

        .goal-select {
            background: rgba(255,255,255,0.8);
            border: 1px solid #e0d3c5;
            border-radius: 40px;
            padding: 0.8rem 1.5rem;
            color: #2d342e;
        }

        .days-grid {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .day-check {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 50px;
        }

        .day-check input {
            width: 20px;
            height: 20px;
            margin-bottom: 0.2rem;
            accent-color: #7f9a6b;
        }

        .day-check label {
            font-size: 0.8rem;
            color: #5e6b53;
        }

        .reminder-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .reminder-time {
            background: rgba(255,255,255,0.8);
            border: 1px solid #e0d3c5;
            border-radius: 40px;
            padding: 0.7rem 1.2rem;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #4a5548;
        }

        .privacy-selector {
            display: flex;
            gap: 1.5rem;
            background: rgba(230, 220, 210, 0.3);
            border-radius: 2rem;
            padding: 1rem 1.5rem;
        }

        .privacy-option {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .privacy-option input[type="radio"] {
            accent-color: #7f9a6b;
        }

        .submit-btn {
            background: #d8cdbf;
            border: none;
            padding: 1rem 2rem;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: 500;
            color: #2f3e32;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.6);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            width: 100%;
            margin: 2rem 0 1rem 0;
            transition: 0.2s;
        }

        .submit-btn:hover {
            background: #c2b3a1;
        }

        @media (max-width: 500px) {
            .form-header h1 {
                font-size: 1.6rem;
            }
            .radio-group {
                flex-direction: column;
                gap: 0.8rem;
            }
            .privacy-selector {
                flex-direction: column;
                gap: 0.8rem;
            }
        }

input[name="period"]:disabled + label {
    opacity: 0.5;
    cursor: not-allowed;
}


    </style>
</head>
<body>

<div class="form-card">
    <div class="nav-bar">
        <span onclick="window.location.href='/app/profile.html'" style="font-weight: 500; cursor:pointer;">мой путь</span>
        <div class="nav-links">
            <span onclick="window.location.href='/app/lenta.html'">лента</span>
            <span onclick="window.location.href='/app/club.html'">клубы</span>
            <span onclick="window.location.href='/app/knowledge.html'">база</span>
        </div>
        <div></div>
    </div>

    <div class="form-header">
        <h1>новая практика</h1>
        <p>маленький шаг, который станет привычкой</p>
    </div>

    <div class="practice-form">
        <form id="practiceForm">
            <div class="form-group">
                <label class="form-label">название практики</label>
                <input type="text" class="form-input" id="name" value="" required>
            </div>

            <div class="form-group">
                <label class="form-label">тип</label>
                <div class="radio-group">
                    <label class="radio-item"><input type="radio" name="type" value="meditation" checked> медитация</label>
                    <label class="radio-item"><input type="radio" name="type" value="yoga"> йога</label>
                    <label class="radio-item"><input type="radio" name="type" value="sport"> спорт</label>
                    <label class="radio-item"><input type="radio" name="type" value="nutrition"> питание</label>
                    <label class="radio-item"><input type="radio" name="type" value="sleep"> сон</label>   
                    <label class="radio-item"><input type="radio" name="type" value="askesa"> аскеза</label>                 
                    <label class="radio-item"><input type="radio" name="type" value="other"> другое</label>                      
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">цель (сколько)</label>
                <div class="goal-row">
                    <input type="number" class="goal-input" id="goalValue" value="" min="1">
                    <select class="goal-select" id="goalUnit">
                        <option value="minutes">минут</option>
                        <option value="hours">часов</option>
                        <option value="km">километров</option>
                        <option value="times">раз</option>
                        <option value="pages">страниц</option>
                    </select>
                </div>
                <div style="margin-top:0.8rem;">
                    <label class="checkbox-label">
                        <input type="checkbox" id="goalDaysCheck"> продолжительность (подряд)
                    </label>
                    <div style="display:flex; gap:0.5rem; margin-top:0.5rem; margin-left:1.5rem;">
                        <input type="number" class="goal-input" id="goalDays" placeholder="21" style="width:80px;" disabled> дней
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">повторять</label>
                <div style="margin-bottom:0.8rem;">
                    <label class="checkbox-label"><input type="radio" name="period" value="daily" checked> каждый день</label>
                    <label class="checkbox-label"><input type="radio" name="period" value="weekly"> несколько раз в неделю</label>
                </div>
                <div class="days-grid" id="daysGrid" style="opacity:0.5; pointer-events:none;">
                    <div class="day-check"><input type="checkbox" value="1" name="day"><label>пн</label></div>
                    <div class="day-check"><input type="checkbox" value="2" name="day"><label>вт</label></div>
                    <div class="day-check"><input type="checkbox" value="3" name="day"><label>ср</label></div>
                    <div class="day-check"><input type="checkbox" value="4" name="day"><label>чт</label></div>
                    <div class="day-check"><input type="checkbox" value="5" name="day"><label>пт</label></div>
                    <div class="day-check"><input type="checkbox" value="6" name="day"><label>сб</label></div>
                    <div class="day-check"><input type="checkbox" value="7" name="day"><label>вс</label></div>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">напоминания</label>
                <div class="reminder-row">
                    <input type="time" class="reminder-time" id="reminderTime" value="08:00">                   
                   <label class="checkbox-label"><input type="checkbox" value="push" name="reminder"> получать уведомления</label>
                  <!--  <label class="checkbox-label"><input type="checkbox" value="push" name="reminder"> push</label>-->
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">кто видит</label>
                <div class="privacy-selector">
                    <label class="privacy-option"><input type="radio" name="privacy" value="private" checked> только я</label>
                    <label class="privacy-option"><input type="radio" name="privacy" value="friends"> друзья</label>
                    <label class="privacy-option"><input type="radio" name="privacy" value="public"> все</label>
                </div>
            </div>

            <button type="submit" class="submit-btn">начать путь</button>
        </form>
    </div>

    <div style="text-align: center; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid rgba(180,160,140,0.2); color: #a49888; font-size: 0.85rem;">
        каждый день  шаг на пути
    </div>
</div>

<script>
    const token = localStorage.getItem('token');
    if (!token) {
        alert('Нет токена, перенаправление на логин');
        window.location.href = '/';
    }

    // Логика дней недели
    document.querySelectorAll('input[name="period"]').forEach(radio => {
        radio.addEventListener('change', function() {
            const daysGrid = document.getElementById('daysGrid');
            if (this.value === 'weekly') {
                daysGrid.style.opacity = '1';
                daysGrid.style.pointerEvents = 'auto';
            } else {
                daysGrid.style.opacity = '0.5';
                daysGrid.style.pointerEvents = 'none';
            }
        });
    });

   

// Логика чекбокса "цель на дни"  блокировка weekly
document.getElementById('goalDaysCheck').addEventListener('change', function() {
    const goalDaysInput = document.getElementById('goalDays');
    const weeklyRadio = document.querySelector('input[name="period"][value="weekly"]');
    const dailyRadio = document.querySelector('input[name="period"][value="daily"]');
    const daysGrid = document.getElementById('daysGrid');
    
    goalDaysInput.disabled = !this.checked;
    
    if (this.checked) {
        // Если выбрана аскеза  блокируем weekly, ставим daily
        weeklyRadio.disabled = true;
        dailyRadio.checked = true;
        daysGrid.style.opacity = '0.5';
        daysGrid.style.pointerEvents = 'none';
        
        if (!goalDaysInput.value || goalDaysInput.value === '') {
            goalDaysInput.value = '21';
        }
    } else {
        // Если аскеза снята  разблокируем weekly
        weeklyRadio.disabled = false;
        goalDaysInput.value = '';
    }
});

document.getElementById('practiceForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    // Валидация
    if (document.getElementById('goalDaysCheck').checked && !document.getElementById('goalDays').value) {
        alert('Укажите количество дней для аскезы');
        return;
    }

   


const isBinary = document.getElementById('goalDaysCheck').checked && !document.getElementById('goalValue').value;


const formData = {
    name: document.getElementById('name').value,
    type: document.querySelector('input[name="type"]:checked').value,
    goal_value: document.getElementById('goalValue').value ? parseInt(document.getElementById('goalValue').value) : null,
    goal_unit: isBinary ? null : document.getElementById('goalUnit').value,  //  вот это главное изменение
    goal_days: document.getElementById('goalDaysCheck').checked ? parseInt(document.getElementById('goalDays').value) : null,
    is_binary: isBinary,
    period_type: document.querySelector('input[name="period"]:checked').value,
    reminder_time: document.getElementById('reminderTime').value || null,
    reminder_channels: Array.from(document.querySelectorAll('input[name="reminder"]:checked')).map(cb => cb.value),
    privacy: document.querySelector('input[name="privacy"]:checked').value,
    is_active: true
};




    if (formData.period_type === 'weekly') {
        formData.days_of_week = Array.from(document.querySelectorAll('input[name="day"]:checked')).map(cb => parseInt(cb.value));
    }

    try {
        const response = await fetch('/api/practices', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + token
            },
            body: JSON.stringify(formData)
        });

        const result = await response.json();

        if (response.ok) {
            alert('Практика создана!');
            console.log(result);
            window.location.href = '/app/profile.html';
        } else {
            alert('Ошибка: ' + (result.message || 'Неизвестная ошибка'));
        }
    } catch (error) {
        alert('Ошибка соединения');
        console.error(error);
    }
});






// Логика для типа "Аскеза"
const typeRadios = document.querySelectorAll('input[name="type"]');
const goalRow = document.querySelector('.goal-row');
const goalDaysCheck = document.getElementById('goalDaysCheck');
const goalDaysInput = document.getElementById('goalDays');
const weeklyRadio = document.querySelector('input[name="period"][value="weekly"]');
const dailyRadio = document.querySelector('input[name="period"][value="daily"]');
const daysGrid = document.getElementById('daysGrid');
const goalUnitSelect = document.getElementById('goalUnit');

function toggleAskesaMode() {
    const isAskesa = document.querySelector('input[name="type"]:checked')?.value === 'askesa';
    
    // Блок цели (число + единицы)
    if (goalRow) {
        goalRow.style.opacity = isAskesa ? '0.5' : '1';
        goalRow.querySelectorAll('input, select').forEach(el => el.disabled = isAskesa);
    }
    
    // Чекбокс "цель на дни подряд"
    if (goalDaysCheck) {
        goalDaysCheck.checked = isAskesa ? true : goalDaysCheck.checked;
        goalDaysCheck.disabled = isAskesa;
        
        // Поле ввода дней
        if (goalDaysInput) {
            goalDaysInput.disabled = isAskesa ? false : !goalDaysCheck.checked;
            if (isAskesa && !goalDaysInput.value) {
                goalDaysInput.value = '21';
            }
        }
    }
    
    // Периодичность
    if (weeklyRadio) {
        weeklyRadio.disabled = isAskesa;
        if (isAskesa) {
            dailyRadio.checked = true;
            daysGrid.style.opacity = '0.5';
            daysGrid.style.pointerEvents = 'none';
        } else {
            // Восстанавливаем доступность weekly в зависимости от чекбокса
            weeklyRadio.disabled = goalDaysCheck.checked;
        }
    }
    
    // Меняем текст подписи
    const daysLabel = document.querySelector('.form-group .checkbox-label');
    if (daysLabel && daysLabel.textContent.includes('дней подряд')) {
        daysLabel.innerHTML = isAskesa ? 'продолжительность' : 'цель на дни подряд';
    }
}

// Добавляем обработчики на все радио-кнопки типа
typeRadios.forEach(radio => {
    radio.addEventListener('change', toggleAskesaMode);
});

// Запускаем один раз при загрузке
toggleAskesaMode();








</script>
</body>
</html>
