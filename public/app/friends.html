<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Мой Путь&nbsp;&#183;&nbsp;друзья</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f3efe8;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 2rem 1rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .friends-card {
            max-width: 1200px;           
            width:100%;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 2.5rem;        
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
        }

        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 1rem 2rem 0 2rem;
            color: #8d7f71;
            border-bottom: 1px solid #e4d9cf;
            padding-bottom: 0.8rem;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
        }

        .nav-links span {
            cursor: pointer;
        }

        .user-section {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .logout-btn {
            background: #d8cdbf;
            border: none;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .friends-header {
            margin-bottom: 2rem;
        }

        .friends-header h1 {
            font-size: 2rem;
            font-weight: 450;
            color: #2e3b32;
        }

        .search-container {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }

        .search-input {
            flex: 1;
            background: white;
            border: 1px solid #e0d3c5;
            border-radius: 60px;
            padding: 0.8rem 1.2rem;
            font-size: 1rem;
            color: #2a2f2b;
            outline: none;
        }

        .search-input:focus {
            border-color: #b8a48f;
            box-shadow: 0 0 0 3px rgba(180, 160, 140, 0.15);
        }

        .search-btn {
            background: #d8cdbf;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            cursor: pointer;
            font-size: 1rem;
            color: #2f3e32;
            border: 1px solid rgba(255,255,255,0.6);
            transition: all 0.2s;
            white-space: nowrap;
        }

        .search-btn:hover {
            background: #c2b3a1;
        }

        .tabs {
            display: flex;
           /* gap: 1rem;*/
            margin-bottom: 2rem;
            border-bottom: 1px solid #e4d9cf;
            padding-bottom: 0.5rem;
        }

        .tab {
            padding: 0.5rem 1rem;
            cursor: pointer;
            color: #7b6b5c;
            border-radius: 2rem;
            transition: all 0.2s;
        }

        .tab.active {
            background: #e7ddd2;
            color: #2e3b32;
        }

        .user-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 0.5rem;
        }

        .user-list::-webkit-scrollbar {
            width: 6px;
        }

        .user-list::-webkit-scrollbar-track {
            background: #e5dcd2;
            border-radius: 10px;
        }

        .user-list::-webkit-scrollbar-thumb {
            background: #b7a48f;
            border-radius: 10px;
        }

        .user-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 2rem;
            border: 1px solid #e0d3c5;
            cursor: pointer;
            transition: background 0.2s;
        }

        .user-item:hover {
            background: rgba(255, 255, 255, 0.8);
        }

        .user-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(145deg, #d9c8b8, #b7a48f);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4d3b2c;
            border: 2px solid white;
            flex-shrink: 0;
            overflow: hidden;
        }

          .user-avatar img {
              width: 100%;
              height: 100%;
              object-fit: cover;
           }

        .user-info {
            flex: 1;
            min-width: 0;
        }

        .user-name {
            font-weight: 500;
            color: #2e3b32;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-handle {
            font-size: 0.8rem;
            color: #7b6b5c;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .follow-btn {
            background: #d8cdbf;
            border: none;
            padding: 0.5rem 1.5rem;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.9rem;
            color: #2f3e32;
            flex-shrink: 0;
            transition: all 0.2s;
        }

        .follow-btn.following {
            background: #7f9a6b;
            color: white;
        }

        .loader {
            text-align: center;
            padding: 2rem;
            color: #7b6b5c;
        }

        .no-results {
            text-align: center;
            padding: 2rem;
            color: #7b6b5c;
            font-style: italic;
        }

        .footer-note {
            text-align: center;
            margin-top: 2rem;
            color: #a49888;
            font-size: 0.85rem;
        }



/* ===== ГАМБУРГЕР МЕНЮ ===== */
.mobile-header {
    display: none;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    padding-bottom: 0.4rem;
    padding-left: 1rem;
    padding-right: 1rem;
    border-bottom: 1px solid #e4d9cf;
    margin-bottom: 1rem;
    color: #8d7f71; /* основной цвет */
}

.hamburger-icon {
    width: 30px;
    height: 20px;
    position: relative;
    cursor: pointer;
    z-index: 1001;
}

.hamburger-icon span {
    display: block;
    position: absolute;
    height: 1px;
    width: 100%;
    background: #8d7f71; /* цвет полосок */
    border-radius: 3px;
    transition: all 0.3s ease;
}

.hamburger-icon span:nth-child(1) { top: 0; }
.hamburger-icon span:nth-child(2) { top: 8px; }
.hamburger-icon span:nth-child(3) { top: 16px; }

.hamburger-icon.open span:nth-child(1) {
    transform: rotate(45deg);
    top: 8px;
}

.hamburger-icon.open span:nth-child(2) {
    opacity: 0;
}

.hamburger-icon.open span:nth-child(3) {
    transform: rotate(-45deg);
    top: 8px;
}

.menu-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.3);
    backdrop-filter: blur(3px);
    -webkit-backdrop-filter: blur(3px);
    z-index: 1000;
    opacity: 0;
    transition: opacity 0.3s ease;
}

.menu-overlay.show {
    display: block;
    opacity: 1;
}

.side-menu {
    position: fixed;
    top: 0;
    right: -300px;
    width: 280px;
    height: 100%;
    background: rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-left: 1px solid rgba(180, 160, 140, 0.2);
    z-index: 1001;
    transition: right 0.3s ease;
    padding: 2rem 1.5rem;
    pointer-events: none;
}

.side-menu.open {
    right: 0;
    pointer-events: auto;
}

.side-menu-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid #e4d9cf;
}

.menu-logo {
/*    font-size: 1.3rem;
    font-weight: 500;*/
    color: #8d7f71; /* одинаковый цвет с основным */
}

.menu-close {
    font-size: 1.3rem;
    cursor: pointer;
    color: #8d7f71;
    padding: 0.3rem 0.5rem;
    border-radius: 50%;
}

.menu-close:hover {
    background: rgba(180, 160, 140, 0.2);
}

.side-menu-items {
    display: flex;
    flex-direction: column;
    gap: 1rem;
}

.side-menu-items a {
    color: #8d7f71; /* теперь как в ПК-меню */
    text-decoration: none;
    font-size: 1.1rem;
    padding: 0.5rem 0;
    border-bottom: 1px solid rgba(180, 160, 140, 0.2);
    transition: all 0.2s;
}

.side-menu-items a:hover {
    color: #2e3b32; /* тёмно-зелёный при наведении */
    padding-left: 0.5rem;
}

.side-menu-items a.animate {
    transform: translateX(20px);
    opacity: 0;
    animation: slideIn 0.3s ease forwards;
}

@keyframes slideIn {
    to {
        transform: translateX(0);
        opacity: 1;
    }
}

/* Медиазапросы */
@media (max-width: 768px) {
    .nav-bar {
        display: none !important;
    }
    .mobile-header {
        display: flex;
    }
    html, body {
        max-width: 100%;
        overflow-x: hidden;
        position: relative;
    }
}

@media (min-width: 769px) {
    .mobile-header, .side-menu, .menu-overlay {
        display: none !important;
    }
      .feed-layout {
           padding:2rem;
        }
}

.page-wrapper{

max-width: 100%;
    overflow-x: hidden;
    margin: 0 auto;
    padding: 1rem;
    position: relative;
}


html, body{
overflow-x: hidden !important;
    width: 100% !important;
    margin: 0 !important;
    padding: 0 !important;
    position: relative;
}

@media (max-width: 700px) {
    .friends-card {
        padding: 0.9rem;
        max-width:1200px;
    }
}





/* Для мобильной версии */
@media (max-width: 768px) {
    .user-item {
        flex-wrap: wrap; /* разрешаем перенос */
        gap: 0.5rem;
    }
    
    .user-info {
        min-width: 0; /* разрешаем сжатие */
        flex: 1;
    }
    
    .user-name {
        white-space: normal; /* разрешаем перенос */
        word-break: break-word; /* разбиваем длинные слова */
        font-size: 0.9rem;
    }
    
    .user-handle {
        white-space: normal;
        word-break: break-word;
        font-size: 0.75rem;
    }
    
    .follow-btn {
        white-space: nowrap; /* кнопка не переносится */
        flex-shrink: 0;
        padding: 0.3rem 0.8rem;
        font-size: 0.8rem;
    }
}









    </style>
</head>
<body>

<div class="page-wrapper">


<div class="friends-card">

<!-- Кнопка гамбургера -->
<div class="mobile-header">
    <span onclick="window.location.href='/app/profile.html'" style="font-weight: 500; cursor:pointer;">мой путь</span>
    <div class="hamburger-icon" id="hamburgerBtn">
        <span></span>
        <span></span>
        <span></span>
    </div>
</div>

<!-- Затемняющий фон -->
<div class="menu-overlay" id="menuOverlay"></div>

<!-- Меню справа -->
<div class="side-menu" id="sideMenu">
    <div class="side-menu-header">
        <span class="logo-menu"><a href="/app/profile.html" style="animation-delay: 0.1s;border-bottom:none;text-decoration:none;color: #2e3b32;">мой путь</a></span>
        <span class="menu-close" id="closeMenuBtn">&#10005;</span>
    </div>
    <div class="side-menu-items">
        <a href="/app/lenta.html" style="animation-delay: 0.2s">лента</a>
        <a href="/app/clubs.html" style="animation-delay: 0.3s">клубы</a>
        <a href="/app/knowledge.html" style="animation-delay: 0.4s">база</a>
        <a href="#" onclick="logout()" style="animation-delay: 0.5s">выйти</a> 
    </div>
</div>


    <div class="nav-bar">
        <span onclick="window.location.href='/app/profile.html'" style="font-weight: 500; cursor:pointer;">мой путь</span>
        <div class="nav-links">
            <span onclick="window.location.href='/app/lenta.html'">лента</span>
            <span onclick="window.location.href='/app/clubs.html'">клубы</span>
            <span onclick="window.location.href='/app/knowledge.html'">база</span>
        </div>
        
    </div>

   
 <div class="feed-layout">


    <div class="friends-header">
        <h1>друзья</h1>
    </div>

    <div class="search-container">
        <input type="text" class="search-input" id="searchInput" placeholder="поиск...">
        <button class="search-btn" id="searchBtn" onclick="searchUsers()">найти</button>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('followings')">мои подписки</div>
        <div class="tab" onclick="switchTab('followers')">мои подписчики</div>
        <div class="tab" onclick="switchTab('all')">найти людей</div>
    </div>

    <div id="usersList" class="user-list">
        <div class="loader">загрузка...</div>
    </div>

    <div class="footer-note">
        каждый день&nbsp;&#183;&nbsp;шаг на пути
    </div>
</div>
</div>
<script>
    const token = localStorage.getItem('token');
    if (!token) {
        window.location.href = '/';
    }

    let currentTab = 'followings';
    let allUsers = [];          // все загруженные пользователи для текущей вкладки

    function logout() {
        localStorage.removeItem('token');
        window.location.href = '/';
    }

    async function apiRequest(url, options = {}) {
        const headers = {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token,
            ...options.headers
        };
        const response = await fetch('/api' + url, { ...options, headers });
        if (!response.ok) {
            throw new Error(await response.text());
        }
        return response.json();
    }

    async function loadUsers() {
        const list = document.getElementById('usersList');
        list.innerHTML = '<div class="loader">загрузка...</div>';

        try {
            let users = [];
            
            if (currentTab === 'all') {
                // Загружаем первых 20 пользователей
                users = await apiRequest('/users/all?limit=20');
                
                // Загружаем подписки, чтобы отметить, на кого уже подписан
                const followings = await apiRequest('/users/followings');
                const followingIds = followings.map(f => f.id);
                
                users.forEach(user => {
                    user.is_following = followingIds.includes(user.id);
                });
            } else {
                users = await apiRequest(`/users/${currentTab}`);
            }
            
            allUsers = users;
            renderUsers(users);
            
        } catch (err) {
            list.innerHTML = '<div class="loader">ошибка загрузки</div>';
        }
    }

    function renderUsers(users) {
        const list = document.getElementById('usersList');
        
        if (users.length === 0) {
            list.innerHTML = '<div class="no-results">здесь пока никого нет</div>';
            return;
        }

        list.innerHTML = users.map(user => `
            <div class="user-item" onclick="window.location.href='/app/user.html?id=${user.id}'">
                
              <div class="user-avatar">
    ${user.avatar_url 
        ? `<img src="/storage/${user.avatar_url}" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">` 
        : (user.name?.charAt(0) || '?')}
</div>

                <div class="user-info">
                    <div class="user-name">${user.name}</div>
                    <div class="user-handle">@${user.username || 'unknown'}</div>
                </div>
                ${renderButton(user)}
            </div>
        `).join('');
    }

    function renderButton(user) {
        if (currentTab === 'followings') {
            return `<button class="follow-btn following" onclick="event.stopPropagation(); toggleFollow('${user.id}', true)">отписаться</button>`;
        } else if (currentTab === 'followers') {
            const isFollowing = user.is_following || false;
            return `<button class="follow-btn ${isFollowing ? 'following' : ''}" onclick="event.stopPropagation(); toggleFollow('${user.id}', ${isFollowing})">
                ${isFollowing ? 'отписаться' : 'подписаться'}
            </button>`;
        } else {
            return user.is_following !== undefined ? 
                `<button class="follow-btn ${user.is_following ? 'following' : ''}" onclick="event.stopPropagation(); toggleFollow('${user.id}', ${user.is_following})">
                    ${user.is_following ? 'отписаться' : 'подписаться'}
                </button>` : '';
        }
    }

    async function toggleFollow(userId, isFollowing) {
        try {
            if (isFollowing) {
                await apiRequest(`/users/${userId}/unfollow`, { method: 'DELETE' });
            } else {
                await apiRequest(`/users/${userId}/follow`, { method: 'POST' });
            }
            loadUsers();
        } catch (err) {
            alert('Ошибка');
        }
    }




async function searchUsers() {
    const query = document.getElementById('searchInput').value.toLowerCase();
    
    if (!query) {
        loadUsers();
        return;
    }

    if (currentTab === 'all') {
        const list = document.getElementById('usersList');
        list.innerHTML = '<div class="loader">поиск...</div>';

        try {
            const users = await apiRequest(`/users/search?q=${encodeURIComponent(query)}&limit=50`);
            
            if (users.length === 0) {
                // Если ничего не найдено  показываем первых 20
                list.innerHTML = '<div class="no-results">ничего не найдено</div>';
                setTimeout(() => loadUsers(), 1500); // через 1.5 сек возвращаем список
            } else {
                const followings = await apiRequest('/users/followings');
                const followingIds = followings.map(f => f.id);
                
                users.forEach(user => {
                    user.is_following = followingIds.includes(user.id);
                });
                
                renderUsers(users);
            }
        } catch (err) {
            list.innerHTML = '<div class="loader">ошибка поиска</div>';
            setTimeout(() => loadUsers(), 1500);
        }
    } else {
        // Поиск по подпискам/подписчикам (на клиенте)
        const filtered = allUsers.filter(user => 
            user.name.toLowerCase().includes(query) || 
            (user.username && user.username.toLowerCase().includes(query))
        );
        
        const list = document.getElementById('usersList');
        if (filtered.length === 0) {
            list.innerHTML = '<div class="no-results">ничего не найдено</div>';
            setTimeout(() => loadUsers(), 1500);
        } else {
            renderUsers(filtered);
        }
    }
}






    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById('searchInput').value = '';
        loadUsers();
    }







// ===== ГАМБУРГЕР МЕНЮ =====
const hamburger = document.getElementById('hamburgerBtn');
const sideMenu = document.getElementById('sideMenu');
const overlay = document.getElementById('menuOverlay');
const closeBtn = document.getElementById('closeMenuBtn');

function openMenu() {
    sideMenu.classList.add('open');
    overlay.classList.add('show');
    hamburger.classList.add('open');
    
    const links = document.querySelectorAll('.side-menu-items a');
    links.forEach(link => {
        link.classList.remove('animate');
        void link.offsetWidth;
        link.classList.add('animate');
    });
}

function closeMenu() {
    sideMenu.classList.remove('open');
    overlay.classList.remove('show');
    hamburger.classList.remove('open');
    
    const links = document.querySelectorAll('.side-menu-items a');
    links.forEach(link => {
        link.classList.remove('animate');
    });
}

hamburger.addEventListener('click', function() {
    if (sideMenu.classList.contains('open')) {
        closeMenu();
    } else {
        openMenu();
    }
});

if (closeBtn) {
    closeBtn.addEventListener('click', closeMenu);
}

overlay.addEventListener('click', closeMenu);

document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && sideMenu.classList.contains('open')) {
        closeMenu();
    }
});








    loadUsers();
</script>
</div>
</body>
</html>
