# HTTP  перенаправляем на HTTPS
server {
    listen 80;
    server_name myvay.ru www.myvay.ru 130.49.146.224;
    return 301 https://$server_name$request_uri;
}

# HTTPS  основная работа
server {
    listen 443 ssl;
    server_name myvay.ru www.myvay.ru;

    ssl_certificate /etc/letsencrypt/live/myvay.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/myvay.ru/privkey.pem;

    root /var/www/html/public;
    index index.html index.php;

    location /app {
        alias /var/www/html/public/app;
    }

      # Admin Filament
    location /admin {
        try_files $uri $uri/ /index.php?$query_string;
    }


    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location /storage {
        alias /var/www/html/storage/app/public;
    }
}
