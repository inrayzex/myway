<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Мой Путь&nbsp;&#183;&nbsp;клуб</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f0ebe4;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.5;
            color: #2d342e;
            padding: 2rem 1rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .club-card {         
            width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15), inset 0 1px 2px rgba(255, 255, 255, 0.8);
            padding: 0 0 2rem 0;
            border: 1px solid rgba(255, 255, 255, 0.5);
            overflow: hidden;
        }

        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 1rem 2rem 0 2rem;
            color: #8d7f71;
            padding-bottom: 0.8rem;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
        }

        .nav-links span {
            cursor: pointer;
        }

        .user-section {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .logout-btn {
            background: #d8cdbf;
            border: none;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .club-cover {
            height: 200px;
            background: linear-gradient(145deg, #b8aa9a, #9a8b7a);
            margin: 0 2rem 1.5rem 2rem;
            border-radius: 1rem;
            display: flex;
            align-items: flex-end;
            padding: 1.5rem;
            position: relative;
            background-size: cover;
            background-blend-mode: overlay;
            overflow: hidden;
        }

        .club-cover-content {
            background: rgba(40, 35, 30, 0.3);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 2rem;
            padding: 1.2rem 2rem;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
            max-height: 120px;
        }

        .club-title h1 {
            font-size: 2.2rem;
            font-weight: 450;
            color: white;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
            line-height: 1.2;
            word-break: break-word;
            max-width: 80%;
        }

        .club-title p {
            color: rgba(255, 255, 240, 0.9);
            font-size: 0.95rem;
            word-break: break-word;
        }

        .join-btn {
            background: #d8cdbf;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 40px;
            font-weight: 500;
            color: #2f3e32;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.6);
            transition: 0.2s;
        }

        .join-btn:hover {
            background: #c2b3a1;
        }

        .club-layout {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 2rem;
            padding: 0 2rem;
        }

        .club-main {
            display: flex;
            flex-direction: column;
          /*  gap: 2rem;*/
        }

        .club-sidebar {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .club-section {
            background: rgba(250, 245, 240, 0.5);
            border-radius: 1rem;
            border: 1px solid rgba(180, 160, 140, 0.15);
            backdrop-filter: blur(4px);
        }

        .section-title {
            font-size: 1rem;
            font-weight: 450;
            color: #3f5142;
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .club-tracker {
            background: rgba(230, 220, 210, 0.4);
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .tracker-stats {
            display: flex;
            justify-content: space-between;
            margin: 1rem 0;
        }

        .tracker-progress {
            background: #dbcfc1;
            height: 12px;
            border-radius: 20px;
            width: 100%;
            margin: 1rem 0;
        }

        .progress-fill {
            width: 68%;
            height: 12px;
            background: #7f9a6b;
            border-radius: 20px;
        }

        .member-miniatures {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .member-dot {
            width: 36px;
            height: 36px;
            background: #b7a99a;
            border-radius: 50%;
            border: 2px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            color: #4d3f32;
        }

        .club-post {
            background: white;
            border-radius: 1rem;
            margin-bottom: 0.5rem;
            border: 1px solid #ede3d8;
            position: relative;
        }

        .post-author {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 1rem;
            padding-left: 1rem;
            padding-top: 1rem;
        }

        .author-avatar {
            width: 40px;
            height: 40px;
            background: #cbb9a8;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            color: #4a3f35;
            overflow: hidden;
        }

        .author-name {
            font-weight: 500;
            color: #354334;
        }

        .post-time {
            font-size: 0.8rem;
            color: #8f7e6e;
        }

        .post-image {
            margin: 1rem 0;          
            background: #e8dfd5;
            max-height: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6b5f53;
            overflow: hidden;
        }

        .post-image img {
            width: 100%;
            height: auto;
            max-height:500px;
            object-fit: contain;
        }

        .post-content {
            color: #363f34;
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 1rem;
            padding-left: 1rem;
        }

        .post-actions {
            display: flex;
            gap: 1.5rem;
            margin-top: 1rem;
            color: #7f7264;                   
            align-items: center;
            padding-left: 1rem;
            padding-bottom: 1rem;
            position: relative;
        }

        .post-actions span {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .menu-btn {
            margin-left: auto;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0.2rem 0.5rem;
            border-radius: 0.5rem;
        }

        .post-menu {
            position: absolute;
            right: 1.5rem;
            top: 3rem;
            background: white;
            border-radius: 1rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border: 1px solid #e0d3c5;
            z-index: 10;
            min-width: 200px;
        }

        .post-menu-item {
            padding: 0.8rem 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #2f4033;
            transition: background 0.2s;
        }

        .post-menu-item:hover {
            background: #f0e8e0;
        }

        .post-menu-item.delete:hover {
            color: #b91c1c;
        }

        .members-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.8rem;
        }

        .member-card {
            text-align: center;
        }

        .member-avatar-small {
            width: 60px;
            height: 60px;
            background: #cbb9a8;
            border-radius: 50%;
            margin: 0 auto 0.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            color: #4d3b2c;
            border: 2px solid white;
            overflow: hidden;
        }
        
        .member-name-small {
            font-size: 0.8rem;
            color: #4a5343;
        }

        /* Чат */
        .chat-messages {
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 1rem;
            padding-right: 0.5rem;
            padding: 1rem;
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: #e5dcd2;
            border-radius: 10px;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #b7a48f;
            border-radius: 10px;
        }

        .chat-message {
            display: flex;
            gap: 0.8rem;
            margin-bottom: 1rem;
            padding: 0.5rem;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 1rem;
        }

        .chat-avatar {
            width: 32px;
            height: 32px;
            background: #b7a48f;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .chat-content {
            flex: 1;
        }

        .chat-name {
            font-weight: 500;
            color: #556b4f;
            font-size: 0.9rem;
        }

        .chat-handle {
            font-size: 0.7rem;
            color: #9a8b7a;
            margin-left: 0.3rem;
        }

        .chat-text {
            font-size: 0.9rem;
            color: #3b423b;
            margin-top: 0.2rem;
        }

        .chat-time {
            font-size: 0.7rem;
            color: #9a8b7a;
            margin-left: 0.5rem;
        }

        .chat-input {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .chat-field {
            flex: 1;
            background: white;
            border-radius: 0.9rem;
            padding: 0.7rem 1.2rem;
            border: 1px solid #d9cdc0;
            color: #3c483c;
        }

        .chat-send {
            background: #cdbcab;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 1.2rem;
            color: #2e3b2e;
            cursor: pointer;
        }

        .create-club-btn {
            background: #d8cdbf;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            width: 100%;
            margin-top: 0.5rem;
            color: #2f3e32;
            border: 1px solid rgba(255,255,255,0.6);
            cursor: pointer;
        }

        .comments-section {
            border-top: 1px dashed #e0d3c5;
        }

        .comment-item {
            background: #f8f4f0;
            border-radius: 1rem;
            padding: 0.8rem;
            margin-bottom: 0.5rem;
            margin-top: 0.5rem;
            margin-left: 1rem;
            font-size: 0.9rem;
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.3rem;
        }

        .comment-author {
            font-weight: 600;
            color: #4a5a4a;
        }

        .comment-handle {
            font-size: 0.7rem;
            color: #9a8b7a;
            margin-left: 0.3rem;
        }

        .comment-date {
            font-size: 0.7rem;
            color: #9a8b7a;
        }

        .comment-delete {
            background: none;
            border: none;
            color: #b77c7c;
            cursor: pointer;
        }

        /* ===== ТАБЫ ДЛЯ МОБИЛЬНОЙ ВЕРСИИ ===== */
        .mobile-tabs {
            display: none;
            gap: 0.5rem;
            margin-top: 1rem;
            padding: 0.3rem;
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 100;
            border-radius: 3rem;
            border: 1px solid rgba(180, 160, 140, 0.2);
        }

        .mobile-tab {
            flex: 1;
            background: transparent;
            border: none;
            padding: 0.5rem;
            border-radius: 3rem;
            font-size: 1rem;
            color: #8d7f71;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 450;
        }

        .mobile-tab.active {
            background: #b8a48f;
            color: white;
        }

        .mobile-section {
            display: none;
        }

        .mobile-section.active {
            display: block;
        }

        /* ===== УЧАСТНИКИ В СТИЛЕ ВК ===== */
        .mobile-users-section {
            padding: 0.5rem 0;
            background: transparent;
            border: none;
            backdrop-filter: none;
        }

        .members-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0 1rem;
        }

        .members-count {
            color: #2e3b32;
            white-space: nowrap;
            font-size: 0.95rem;
        }

        .members-count span {
            font-weight: 600;
            margin-right: 0.2rem;
        }

        .members-avatars-stack {
            display: flex;
            align-items: center;
            flex-wrap: nowrap;
        }

        .stack-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid white;
            background: #cbb9a8;
            margin-left: -8px;
            overflow: hidden;
            flex-shrink: 0;
            cursor: pointer;
            transition: transform 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            color: #4d3b2c;
        }

        .stack-avatar:first-child {
            margin-left: 0;
        }

        .stack-avatar:hover {
            transform: translateY(-2px);
        }

        .stack-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .more-indicator {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #d8cdbf;
            border: 2px solid white;
            margin-left: -8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 500;
            color: #2f3e32;
            flex-shrink: 0;
            cursor: pointer;
            transition: all 0.2s;
        }

        .more-indicator:hover {
            transform: translateY(-2px);
            background: #c2b3a1;
        }

        .members-all-link {
            text-align: right;
            padding: 0.3rem 1rem 0.5rem;
            color: #7b8a70;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .members-all-link:hover {
            color: #2e3b32;
        }

        /* Модальное окно со всеми участниками */
        .members-modal .modal-content {
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .members-modal-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin: 1.5rem 0;
        }

        .members-modal-item {
            text-align: center;
            cursor: pointer;
        }

        .members-modal-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            margin: 0 auto 0.3rem;
            background: #cbb9a8;
            border: 2px solid white;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: #4d3b2c;
        }

        .members-modal-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .members-modal-name {
            font-size: 0.8rem;
            color: #2e3b32;
            word-break: break-word;
        }

        /* Модальное окно */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        /* ===== ГАМБУРГЕР МЕНЮ ===== */
        .mobile-header {
            display: none;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding-bottom: 0.4rem;
            padding-left: 1rem;
            padding-right: 1rem;
            border-bottom: 1px solid #e4d9cf;
            margin-bottom: 1rem;
            color: #8d7f71;
        }

        .hamburger-icon {
            width: 30px;
            height: 20px;
            position: relative;
            cursor: pointer;
            z-index: 1001;
        }

        .hamburger-icon span {
            display: block;
            position: absolute;
            height: 1px;
            width: 100%;
            background: #8d7f71;
            border-radius: 3px;
            transition: all 0.3s ease;
        }

        .hamburger-icon span:nth-child(1) { top: 0; }
        .hamburger-icon span:nth-child(2) { top: 8px; }
        .hamburger-icon span:nth-child(3) { top: 16px; }

        .hamburger-icon.open span:nth-child(1) {
            transform: rotate(45deg);
            top: 8px;
        }

        .hamburger-icon.open span:nth-child(2) {
            opacity: 0;
        }

        .hamburger-icon.open span:nth-child(3) {
            transform: rotate(-45deg);
            top: 8px;
        }

        .menu-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(3px);
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .menu-overlay.show {
            display: block;
            opacity: 1;
        }

        .side-menu {
            position: fixed;
            top: 0;
            right: -300px;
            width: 280px;
            height: 100%;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-left: 1px solid rgba(180, 160, 140, 0.2);
            z-index: 1001;
            transition: right 0.3s ease;
            padding: 2rem 1.5rem;
            pointer-events: none;
        }

        .side-menu.open {
            right: 0;
            pointer-events: auto;
        }

        .side-menu-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #e4d9cf;
        }

        .menu-logo {
            color: #8d7f71;
        }

        .menu-close {
            font-size: 1.3rem;
            cursor: pointer;
            color: #8d7f71;
            padding: 0.3rem 0.5rem;
            border-radius: 50%;
        }

        .menu-close:hover {
            background: rgba(180, 160, 140, 0.2);
        }

        .side-menu-items {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .side-menu-items a {
            color: #8d7f71;
            text-decoration: none;
            font-size: 1.1rem;
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(180, 160, 140, 0.2);
            transition: all 0.2s;
        }

        .side-menu-items a:hover {
            color: #2e3b32;
            padding-left: 0.5rem;
        }

        .side-menu-items a.animate {
            transform: translateX(20px);
            opacity: 0;
            animation: slideIn 0.3s ease forwards;
        }

        @keyframes slideIn {
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .create-club-post-btn {
            background: #d8cdbf;
            border: none;
            padding: 0.5rem;
            border-radius: 3rem;
            font-size: 1rem;
            color: #2f3e32;
            cursor: pointer;
            width: 100%;
            margin-top: 1rem;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255,255,255,0.6);
        }

        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: 2rem;
            max-width: 500px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        .modal-content h3 {
            font-size: 1.5rem;
            font-weight: 450;
            color: #2e3b32;
            margin-bottom: 1.5rem;
        }

        .modal-content textarea {
            width: 100%;
            padding: 1rem;
            border-radius: 1rem;
            border: 1px solid #e0d3c5;
            background: rgba(255,255,255,0.9);
            font-family: inherit;
            font-size: 1rem;
            margin-bottom: 1rem;
            resize: vertical;
        }

        .modal-content textarea:focus {
            border-color: #b8a48f;
            outline: none;
            box-shadow: 0 0 0 3px rgba(180, 160, 140, 0.15);
        }

        .photo-upload {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .photo-preview {
            width: 60px;
            height: 60px;
            border-radius: 0.8rem;
            background: #e7ddd2;
            border: 1px solid #cbb9a8;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .photo-btn {
            background: #d8cdbf;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            font-size: 0.9rem;
            color: #2f3e32;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.6);
        }

        .modal-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .modal-btn {
            flex: 1;
            padding: 0.8rem;
            border: none;
            border-radius: 2rem;
            cursor: pointer;
            font-size: 1rem;
            border: 1px solid rgba(255,255,255,0.6);
            transition: 0.2s;
        }

        .modal-btn.confirm {
            background: #d8cdbf;
            color: #2f3e32;
        }

        .modal-btn.confirm:hover {
            background: #c2b3a1;
        }

        .modal-btn.cancel {
            background: #f0ebe4;
            color: #786e62;
        }

        .modal-btn.cancel:hover {
            background: #e5dbd1;
        }

        /* Медиазапросы */
        @media (max-width: 800px) {
            .club-layout {
                grid-template-columns: 1fr;
                padding: 0rem;
            }
            .club-cover-content {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }
            .club-title h1 {
                font-size: 1.8rem;
            }
        }

        @media (max-width: 768px) {
            .nav-bar {
                display: none !important;
            }
            .mobile-header {
                display: flex;
            }
            .mobile-tabs {
                display: flex;
            }
            html, body {
                max-width: 100%;
                overflow-x: hidden;
                position: relative;
            }
            .club-card {
                width:100%;
            }
            .club-cover {
                margin: 0rem;
                padding: 1rem;
                height: auto;
                min-height: 150px;
            }
            .club-cover-content {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.8rem;
                padding: 1rem;
                max-height: none;
            }
            .club-title h1 {
                font-size: 1.5rem;
                max-width: 100%;
            }
            .join-btn {
                align-self: stretch;
                text-align: center;
            }

                max-height: none;

            /* Показываем мобильные участники */

            overflow-x: hidden !important;
            width: 100% !important;
            margin: 0 !important;
            padding: 0 !important;
            position: relative;
        }

        @media (max-width: 700px) {
            .club-card {
                padding:0.7rem;
            }
        }
    </style>
</head>
<body>

<div class="club-card">

    <!-- Кнопка гамбургера -->
    <div class="mobile-header">
        <span onclick="window.location.href='/app/profile.html'" style="font-weight: 500; cursor:pointer;">мой путь</span>
        <div class="hamburger-icon" id="hamburgerBtn">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>

    <!-- Затемняющий фон -->
    <div class="menu-overlay" id="menuOverlay"></div>

    <!-- Меню справа -->
    <div class="side-menu" id="sideMenu">
        <div class="side-menu-header">
            <span class="logo-menu"><a href="/app/profile.html" style="animation-delay: 0.1s;border-bottom:none;text-decoration:none;color: #2e3b32;">мой путь</a></span>     
            <span class="menu-close" id="closeMenuBtn">&#10005;</span>
        </div>
        <div class="side-menu-items">
            <a href="/app/lenta.html" style="animation-delay: 0.2s">лента</a>
            <a href="/app/clubs.html" style="animation-delay: 0.2s">клубы</a>         
            <a href="/app/knowledge.html" style="animation-delay: 0.3s">база</a>       
            <a href="#" onclick="logout()" style="animation-delay: 0.4s">выйти</a>
        </div>
    </div>

    <!-- Десктоп навигация -->
    <div class="nav-bar">
        <span onclick="window.location.href='/app/profile.html'" style="font-weight: 500; cursor:pointer;">мой путь</span>
        <div class="nav-links">
            <span onclick="window.location.href='/app/lenta.html'">лента</span>
            <span onclick="window.location.href='/app/clubs.html'">клубы</span>
            <span onclick="window.location.href='/app/knowledge.html'">база</span>
        </div>
    </div>

    <!-- Обложка клуба -->
    <div class="club-cover" id="clubCover" style="background-image: linear-gradient(145deg, #b8aa9a, #9a8b7a);">
        <div class="club-cover-content">
            <div class="club-title">
                <h1 id="clubName">Загрузка...</h1>
                <p id="clubDescription"></p>
            </div>
            <button class="join-btn" id="joinBtn" onclick="toggleJoin()">вступить</button>
        </div>
    </div>

    <!-- Основной лейаут -->
    <div class="club-layout">
        <!-- Левая колонка (основной контент) -->
        <div class="club-main">
            
            <!-- УЧАСТНИКИ ДЛЯ МОБИЛЬНЫХ (СТРОКА СО СЧЕТЧИКОМ) -->
            <div id="mobile-section-users" class="club-section mobile-users-section">
                <div class="members-row">
                    <div class="members-count">
                        <span id="membersCountMobile">0</span> участников
                    </div>
                    <div class="members-avatars-stack" id="membersStackMobile">
                        <!-- Сюда будут добавляться аватарки через JS -->
                    </div>
                </div>
                   <div id="clubCreatorMobile" style="display: none;"></div>
                <div class="members-all-link" onclick="showAllMembers()">
                    все участники 
                </div>
            </div>
            
            <!-- ТАБЫ ДЛЯ МОБИЛЬНОЙ ВЕРСИИ -->
            <div class="mobile-tabs">
                <button class="mobile-tab active" onclick="switchClubMobileTab('posts')">публикации</button>
                <button class="mobile-tab" onclick="switchClubMobileTab('chat')">чат</button>
            </div>
            
            <!-- СЕКЦИЯ С ПУБЛИКАЦИЯМИ (только посты) -->
            <div id="clubMobilePostsSection" class="mobile-section active">
                <button class="create-club-post-btn" onclick="showCreatePostModal()">создать публикацию</button>
                <div id="postsContainer"></div>
            </div>
            
            <!-- СЕКЦИЯ С ЧАТОМ (только чат) -->
            <div id="clubMobileChatSection" class="mobile-section">
                <div class="club-section" style="background: transparent; border: none; padding: 0;">
                    <div class="chat-messages" id="clubMobileChatMessages" style="max-height: 60vh;"></div>
                    <div class="chat-input" style="margin-top: 1rem;">
                        <input type="text" class="chat-field" id="clubMobileChatInput" placeholder="написать..." onkeypress="if(event.key==='Enter') sendMobileMessage()">
                        <button class="chat-send" onclick="sendMobileMessage()"></button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Правая колонка (сайдбар для десктопа) -->
        <div class="club-sidebar">
            <div id="pc-section-users" class="club-section">
                <div class="section-title"> участники  <span id="membersCount">0</span></div>
                <div class="members-grid" id="membersGrid"></div>
                <div style="text-align:center; margin-top:0.8rem; color:#7b8a70;" id="clubCreator"></div>
            </div>

            <div class="club-section">
                <div class="section-title"> чат</div>
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-input">
                    <input type="text" class="chat-field" id="chatInput" placeholder="написать..." onkeypress="if(event.key==='Enter') sendMessage()">
                    <button class="chat-send" onclick="sendMessage()"></button>
                </div>
            </div>
        </div>
    </div>

    <!-- Футер -->
    <div style="text-align: center; margin-top: 2rem; padding-top: 1rem; border-top: 1px solid rgba(180,160,140,0.2); color: #a49888; font-size: 0.85rem;">
        каждый день&nbsp;&#183;&nbsp;шаг на пути
    </div>
</div>

<!-- Модальное окно создания поста в клубе -->
<div class="modal" id="createClubPostModal">
    <div class="modal-content">
        <h3>новая запись</h3>
        <textarea id="clubPostContent" placeholder="текст записи..." rows="4"></textarea>
        <div class="photo-upload">
            <div class="photo-preview" id="clubPostPhotoPreview">
                <span></span>
            </div>
            <button type="button" class="photo-btn" onclick="document.getElementById('clubPostPhoto').click()">выбрать фото</button>
            <input type="file" id="clubPostPhoto" accept="image/*" style="display:none;">
        </div>
        <div class="modal-buttons">
            <button class="modal-btn confirm" onclick="createClubPost()">опубликовать</button>
            <button class="modal-btn cancel" onclick="closeCreatePostModal()">отмена</button>
        </div>
    </div>
</div>

<!-- Модальное окно со всеми участниками -->
<div class="modal members-modal" id="allMembersModal">
    <div class="modal-content">
        <h3>все участники <span id="allMembersCount"></span></h3>
        <div class="members-modal-grid" id="allMembersGrid"></div>
        <div class="modal-buttons" style="margin-top: 1.5rem;">
            <button class="modal-btn cancel" onclick="closeAllMembersModal()">закрыть</button>
        </div>
    </div>
</div>

<script>
    const token = localStorage.getItem('token');
    if (!token) {
        window.location.href = '/';
    }

    let currentClub = null;
    let isMember = false;
    let currentUser = null;
    let openMenuPostId = null;
    let chatMessages = [];
    let chatInterval = null;
    let commentsPage = {};
    let clubMobileTab = 'posts';

    async function apiRequest(url, options = {}) {
        const headers = {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token,
            ...options.headers
        };
        const response = await fetch('/api' + url, { ...options, headers });
        if (!response.ok) throw new Error(await response.text());
        return response.json();
    }

    async function loadClub() {
        try {
            currentUser = await apiRequest('/user');
            
            const urlParams = new URLSearchParams(window.location.search);
            let clubId = urlParams.get('id');
            
            if (!clubId) {
                const clubs = await apiRequest('/clubs');
                if (clubs.length === 0) {
                    document.getElementById('clubName').textContent = 'Нет клубов';
                    return;
                }
                clubId = clubs[0].id;
            }
            
            currentClub = await apiRequest('/clubs/' + clubId);
            renderClub();
            loadChat();
            
            if (chatInterval) clearInterval(chatInterval);
            chatInterval = setInterval(loadChat, 5000);
            
            restoreClubMobileTab();
            
        } catch (err) {
            console.error(err);
        }
    }

    function renderClub() {
        document.getElementById('clubName').textContent = currentClub.name;
        document.getElementById('clubDescription').textContent = currentClub.description || 'чат  посты  вместе';

        const coverEl = document.getElementById('clubCover');
        if (currentClub.cover_url) {
            coverEl.style.backgroundImage = `url(/storage/${currentClub.cover_url})`;
        } else {
            coverEl.style.backgroundImage = 'linear-gradient(145deg, #b8aa9a, #9a8b7a)';
        }  

        const members = currentClub.members || [];
        
        document.getElementById('membersCount').textContent = members.length;
        document.getElementById('membersCountMobile').textContent = members.length;

        const creator = members.find(m => m.role === 'creator');
        const creatorHtml = creator ? ` создатель: ${creator.name}` : '';
        document.getElementById('clubCreator').innerHTML = creatorHtml;
        document.getElementById('clubCreatorMobile').innerHTML = creatorHtml;

        // Рендерим сетку участников для десктопа
        const grid = document.getElementById('membersGrid');
        if (grid) {
            grid.innerHTML = '';
            members.slice(0, 6).forEach(m => {
                grid.innerHTML += `
                    <div class="member-card" onclick="window.location.href='/app/user.html?id=${m.id}'" style="cursor:pointer;">
                        <div class="member-avatar-small" style="overflow: hidden;">
                            ${m.avatar_url 
                                ? `<img src="/storage/${m.avatar_url}" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">` 
                                : (m.name?.charAt(0) || '?')}
                        </div>
                        <div class="member-name-small">${m.name || ''}</div>
                    </div>
                `;
            });
        }

        // ===== СТЕК АВАТАРОК ДЛЯ МОБИЛЬНЫХ =====
        const stackContainer = document.getElementById('membersStackMobile');
        if (stackContainer) {
            stackContainer.innerHTML = '';
            
            // Показываем максимум 5 аватарок
            const maxDisplay = 5;
            const displayMembers = members.slice(0, maxDisplay);
            
            displayMembers.forEach(m => {
                stackContainer.innerHTML += `
                    <div class="stack-avatar" onclick="window.location.href='/app/user.html?id=${m.id}'">
                        ${m.avatar_url 
                            ? `<img src="/storage/${m.avatar_url}" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">` 
                            : (m.name?.charAt(0) || '?')}
                    </div>
                `;
            });
            
            // Если участников больше, чем показали, добавляем индикатор "+N"
            if (members.length > maxDisplay) {
                const remaining = members.length - maxDisplay;
                stackContainer.innerHTML += `
                    <div class="more-indicator" onclick="showAllMembers()">+${remaining}</div>
                `;
            }
        }
        // ===== КОНЕЦ СТЕКА АВАТАРОК =====

        isMember = members.some(m => m.id === currentUser?.id);
        const isCreator = currentUser?.id === currentClub.creator_id;

        const joinBtn = document.getElementById('joinBtn');
        if (isCreator) {
            joinBtn.textContent = 'удалить клуб';
            joinBtn.onclick = deleteClub;
        } else if (isMember) {
            joinBtn.textContent = 'выйти';
            joinBtn.onclick = toggleJoin;
        } else {
            joinBtn.textContent = 'вступить';
            joinBtn.onclick = toggleJoin;
        }

        renderPosts();
    }

    async function renderPosts() {
        const posts = currentClub.posts || [];
        const postsContainer = document.getElementById('postsContainer');
        if (!postsContainer) return;
        
        postsContainer.innerHTML = '';
        
        const sortedPosts = [...posts].sort((a, b) => 
            new Date(b.created_at) - new Date(a.created_at)
        );
        
        sortedPosts.forEach(post => {
            const isAuthor = post.user_id === currentUser.id;
            postsContainer.innerHTML += `
                <div class="club-post" data-post-id="${post.id}">
                    <div class="post-author">
                        <div class="author-avatar" style="overflow: hidden;">
                            ${post.user?.avatar_url 
                                ? `<img src="/storage/${post.user.avatar_url}" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">` 
                                : (post.user?.name?.charAt(0) || '?')}
                        </div>
                        <div>
                            <div class="author-name">${post.user?.name || 'Пользователь'}</div>
                            <div class="post-time">${new Date(post.created_at).toLocaleString()}</div>
                        </div>
                    </div>
                    <div class="post-content">${post.content}</div>
                    ${post.photo_url ? `
                    <div class="post-image">
                        <img src="/storage/${post.photo_url}" alt="post image">
                    </div>
                    ` : ''}
                    <div class="post-actions" style="position: relative; display: flex; gap: 1.5rem; align-items: center; margin-top: 1rem;">
                        <span onclick="toggleLike('${post.id}', this)" 
                              style="${post.liked_by_user ? 'color:#e25555;' : ''}">
                            &#10084; ${post.likes_count || 0}
                        </span>
                        <span onclick="toggleComments('${post.id}')">
                            &#128172; ${post.comments_count || 0}
                        </span>
                        
                        ${isAuthor ? `
                            <span class="menu-btn" onclick="togglePostMenu('${post.id}', event)">&#8942;</span>
                            <div class="post-menu" id="menu-${post.id}" style="display: none; position: absolute; top: 100%; right: 0; background: white; border-radius: 1rem; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border: 1px solid #e0d3c5; z-index: 1000; min-width: 150px;">
                                <div class="post-menu-item delete" onclick="deletePost('${post.id}')">
                                    <span>&#128465;</span> удалить
                                </div>
                            </div>
                        ` : ''}
                    </div>
                </div>
            `;
        });
    }

    // ===== ФУНКЦИИ ДЛЯ УЧАСТНИКОВ =====
    function showAllMembers() {
        const members = currentClub.members || [];
        const modal = document.getElementById('allMembersModal');
        const grid = document.getElementById('allMembersGrid');
        const countSpan = document.getElementById('allMembersCount');
        
        countSpan.textContent = `(${members.length})`;
        
        grid.innerHTML = '';
        members.forEach(m => {
            grid.innerHTML += `
                <div class="members-modal-item" onclick="window.location.href='/app/user.html?id=${m.id}'">
                    <div class="members-modal-avatar">
                        ${m.avatar_url 
                            ? `<img src="/storage/${m.avatar_url}" style="width:100%; height:100%; object-fit:cover;">` 
                            : (m.name?.charAt(0) || '?')}
                    </div>
                    <div class="members-modal-name">${m.name || ''}</div>
                </div>
            `;
        });
        
        modal.style.display = 'flex';
    }

    function closeAllMembersModal() {
        document.getElementById('allMembersModal').style.display = 'none';
    }
    // ===== КОНЕЦ ФУНКЦИЙ ДЛЯ УЧАСТНИКОВ =====

    function switchClubMobileTab(tab) {
        const postsSection = document.getElementById('clubMobilePostsSection');
        const chatSection = document.getElementById('clubMobileChatSection');
        const tabs = document.querySelectorAll('.mobile-tab');
        
        clubMobileTab = tab;
        
        if (tab === 'posts') {
            postsSection.classList.add('active');
            chatSection.classList.remove('active');
            tabs[0].classList.add('active');
            tabs[1].classList.remove('active');
        } else {
            chatSection.classList.add('active');
            postsSection.classList.remove('active');
            tabs[1].classList.add('active');
            tabs[0].classList.remove('active');
            renderMobileChat();
        }
        
        localStorage.setItem('clubMobileTab', tab);
    }

    function restoreClubMobileTab() {
        const savedTab = localStorage.getItem('clubMobileTab');
        if (savedTab) {
            switchClubMobileTab(savedTab);
        } else {
            switchClubMobileTab('posts');
        }
    }

    function renderMobileChat() {
        const container = document.getElementById('clubMobileChatMessages');
        if (!container) return;
        
        container.innerHTML = chatMessages.map(msg => `
            <div class="chat-message">
                <div class="chat-avatar"></div>
                <div class="chat-content">
                    <div>
                        <span class="chat-name">${msg.user?.name}</span>
                        <span class="chat-handle">@${msg.user?.username || 'unknown'}</span>
                        <span class="chat-time">${new Date(msg.created_at).toLocaleTimeString()}</span>
                    </div>
                    <div class="chat-text">${msg.content}</div>
                </div>
            </div>
        `).join('');
        container.scrollTop = container.scrollHeight;
    }

    async function sendMobileMessage() {
        const input = document.getElementById('clubMobileChatInput');
        const content = input.value.trim();
        if (!content || !currentClub) return;
        
        try {
            await apiRequest(`/clubs/${currentClub.id}/messages`, {
                method: 'POST',
                body: JSON.stringify({ content })
            });
            input.value = '';
            loadChat();
        } catch (err) {
            alert('Ошибка');
        }
    }

    async function loadChat() {
        if (!currentClub) return;
        
        try {
            const messages = await apiRequest(`/clubs/${currentClub.id}/messages`);
            chatMessages = messages;
            
            const desktopContainer = document.getElementById('chatMessages');
            if (desktopContainer) {
                desktopContainer.innerHTML = chatMessages.map(msg => `
                    <div class="chat-message">
                        <div class="chat-avatar"></div>
                        <div class="chat-content">
                            <div>
                                <span class="chat-name">${msg.user?.name}</span>
                                <span class="chat-handle">@${msg.user?.username || 'unknown'}</span>
                                <span class="chat-time">${new Date(msg.created_at).toLocaleTimeString()}</span>
                            </div>
                            <div class="chat-text">${msg.content}</div>
                        </div>
                    </div>
                `).join('');
                desktopContainer.scrollTop = desktopContainer.scrollHeight;
            }
            
            renderMobileChat();
            
        } catch (err) {
            console.error(err);
        }
    }

    async function sendMessage() {
        const input = document.getElementById('chatInput');
        const content = input.value.trim();
        if (!content || !currentClub) return;
        
        try {
            await apiRequest(`/clubs/${currentClub.id}/messages`, {
                method: 'POST',
                body: JSON.stringify({ content })
            });
            input.value = '';
            loadChat();
        } catch (err) {
            alert('Ошибка');
        }
    }

    async function toggleComments(postId) {
        const postElement = document.querySelector(`.club-post[data-post-id="${postId}"]`);
        if (!postElement) return;
        
        let commentsSection = postElement.querySelector('.comments-section');
        
        if (commentsSection) {
            commentsSection.remove();
            delete commentsPage[postId];
            return;
        }
        
        commentsPage[postId] = 1;
        await loadComments(postId, 1);
    }

    async function loadComments(postId, page) {
        const postElement = document.querySelector(`.club-post[data-post-id="${postId}"]`);
        if (!postElement) return;
        
        let commentsSection = postElement.querySelector('.comments-section');
        
        try {
            const response = await fetch(`/api/clubs/posts/${postId}/comments?page=${page}&limit=5`, {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const data = await response.json();
            const comments = data.data || data;
            const hasMore = data.next_page_url || (comments.length === 5);
            
            if (!commentsSection) {
                commentsSection = document.createElement('div');
                commentsSection.className = 'comments-section';
                postElement.appendChild(commentsSection);
            }
            
            if (page === 1) {
                commentsSection.innerHTML = '';
            }
            
            comments.forEach(c => {
                commentsSection.insertAdjacentHTML('beforeend', `
                    <div class="comment-item">
                        <div class="comment-header">
                            <div>
                                <span class="comment-author">${c.user?.name || 'Пользователь'}</span>
                                <span class="comment-handle">@${c.user?.username || 'unknown'}</span>
                            </div>
                            <span class="comment-date">${new Date(c.created_at).toLocaleDateString()}</span>
                            ${c.user_id === currentUser.id ? `
                                <button class="comment-delete" onclick="deleteComment('${c.id}', '${postId}')">&#128465;</button>
                            ` : ''}
                        </div>
                        <div class="comment-text">${c.content}</div>
                    </div>
                `);
            });
            
            if (hasMore) {
                const showMoreBtn = document.createElement('button');
                showMoreBtn.textContent = 'показать ещё';
                showMoreBtn.style.cssText = 'background:transparent; border:1px solid #cbb9a8; padding:0.3rem 1rem; border-radius:2rem; margin:0.5rem 0; cursor:pointer;';
                showMoreBtn.onclick = () => {
                    commentsPage[postId]++;
                    loadComments(postId, commentsPage[postId]);
                    showMoreBtn.remove();
                };
                commentsSection.appendChild(showMoreBtn);
            }
            
            if (page === 1) {
                const formHtml = `
                    <div style="display:flex; gap:0.5rem; margin-top:1rem;">
                        <input type="text" id="comment-input-${postId}" 
                               placeholder="написать комментарий..." 
                               style="flex:1; padding:0.5rem; border-radius:2rem; border:1px solid #e0d3c5;">
                        <button onclick="addComment('${postId}')" style="background:#d8cdbf; border:none; padding:0.5rem 1rem; border-radius:2rem; cursor:pointer;">отправить</button>
                    </div>
                `;
                commentsSection.insertAdjacentHTML('beforeend', formHtml);
            }
            
        } catch (err) {
            console.error(err);
        }
    }

    async function addComment(postId) {
        const input = document.getElementById(`comment-input-${postId}`);
        const content = input.value.trim();
        if (!content) return;
        
        try {
            await apiRequest(`/clubs/posts/${postId}/comments`, {
                method: 'POST',
                body: JSON.stringify({ content })
            });
            
            input.value = '';
            const postElement = document.querySelector(`.club-post[data-post-id="${postId}"]`);
            const oldSection = postElement.querySelector('.comments-section');
            if (oldSection) oldSection.remove();
            
            commentsPage[postId] = 1;
            await loadComments(postId, 1);
            
            const post = currentClub.posts.find(p => p.id === postId);
            if (post) {
                post.comments_count = (post.comments_count || 0) + 1;
                const commentSpan = document.querySelector(`[onclick="toggleComments('${postId}')"]`);
                if (commentSpan) {
                    commentSpan.innerHTML = `&#128172; ${post.comments_count}`;
                }
            }
            
        } catch (err) {
            alert('Ошибка');
        }
    }

    async function deleteComment(commentId, postId) {
        if (!confirm('Удалить комментарий?')) return;
        
        try {
            await apiRequest(`/comments/${commentId}`, { method: 'DELETE' });
            
            const post = currentClub.posts.find(p => p.id === postId);
            if (post) {
                post.comments_count = Math.max(0, (post.comments_count || 0) - 1);
                const commentSpan = document.querySelector(`[onclick="toggleComments('${postId}')"]`);
                if (commentSpan) {
                    commentSpan.innerHTML = `&#128172; ${post.comments_count}`;
                }
            }
            
            const postElement = document.querySelector(`.club-post[data-post-id="${postId}"]`);
            const oldSection = postElement.querySelector('.comments-section');
            if (oldSection) oldSection.remove();
            
            if (commentsPage[postId]) {
                commentsPage[postId] = 1;
                await loadComments(postId, 1);
            }
            
        } catch (err) {
            alert('Ошибка');
        }
    }

    async function toggleLike(postId, element) {
        try {
            const post = currentClub.posts.find(p => p.id === postId);
            if (!post) return;

            const method = post.liked_by_user ? 'DELETE' : 'POST';
            const url = post.liked_by_user ? `/clubs/posts/${postId}/unlike` : `/clubs/posts/${postId}/like`;

            await apiRequest(url, { method });

            post.liked_by_user = !post.liked_by_user;
            post.likes_count = (post.likes_count || 0) + (post.liked_by_user ? 1 : -1);

            element.innerHTML = `&#10084; ${post.likes_count}`;
            element.style.color = post.liked_by_user ? '#e25555' : '';

        } catch (err) {
            console.error('Ошибка лайка:', err);
        }
    }

    function togglePostMenu(postId, event) {
        event.stopPropagation();
        
        document.querySelectorAll('.post-menu').forEach(menu => {
            if (menu.id !== `menu-${postId}`) {
                menu.style.display = 'none';
            }
        });
        
        const menu = document.getElementById(`menu-${postId}`);
        if (menu) {
            menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
        }
    }

    async function toggleJoin() {
        try {
            if (isMember) {
                await apiRequest('/clubs/' + currentClub.id + '/leave', { method: 'DELETE' });
            } else {
                await apiRequest('/clubs/' + currentClub.id + '/join', { method: 'POST' });
            }
            loadClub();
        } catch (err) {
            alert('Ошибка');
        }
    }

    async function deleteClub() {
        if (!confirm('Точно удалить клуб? Все посты и сообщения пропадут.')) return;
        
        try {
            await apiRequest('/clubs/' + currentClub.id, { method: 'DELETE' });
            window.location.href = '/app/clubs.html';
        } catch (err) {
            alert('Ошибка удаления');
        }
    }

    async function deletePost(postId) {
        if (!confirm('Удалить запись?')) return;
        
        try {
            await apiRequest(`/clubs/posts/${postId}`, { method: 'DELETE' });
            loadClub();
        } catch (err) {
            alert('Ошибка: ' + err.message);
        }
    }

    function showCreatePostModal() {
        document.getElementById('createClubPostModal').style.display = 'flex';
        document.getElementById('clubPostContent').value = '';
        document.getElementById('clubPostPhotoPreview').innerHTML = '<span></span>';
        document.getElementById('clubPostPhoto').value = '';
    }

    function closeCreatePostModal() {
        document.getElementById('createClubPostModal').style.display = 'none';
    }

    async function compressImage(file, maxWidth = 800, quality = 0.8) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    
                    if (width > maxWidth) {
                        height = Math.round(height * maxWidth / width);
                        width = maxWidth;
                    }
                    
                    canvas.width = width;
                    canvas.height = height;
                    canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                    
                    canvas.toBlob((blob) => {
                        resolve(new File([blob], file.name, {
                            type: 'image/jpeg',
                            lastModified: Date.now()
                        }));
                    }, 'image/jpeg', quality);
                };
                img.onerror = reject;
            };
            reader.onerror = reject;
        });
    }

    async function createClubPost() {
        const content = document.getElementById('clubPostContent').value.trim();
        const photoFile = document.getElementById('clubPostPhoto').files[0];

        if (!content) {
            alert('Введите текст');
            return;
        }

        try {
            const formData = new FormData();
            formData.append('content', content);

            if (photoFile) {
                const compressedPhoto = await compressImage(photoFile, 800, 0.8);
                formData.append('photo', compressedPhoto);
            }

            const response = await fetch('/api/clubs/' + currentClub.id + '/posts', {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer ' + token
                },
                body: formData
            });

            if (response.ok) {
                closeCreatePostModal();
                loadClub();
            } else {
                const error = await response.text();
                alert('Ошибка: ' + error);
            }
        } catch (err) {
            alert('Ошибка соединения');
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        const photoInput = document.getElementById('clubPostPhoto');
        if (photoInput) {
            photoInput.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        document.getElementById('clubPostPhotoPreview').innerHTML = `<img src="${e.target.result}" style="width:100%; height:100%; object-fit:cover;">`;
                    };
                    reader.readAsDataURL(file);
                }
            });
        }
    });

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && e.target.id && e.target.id.startsWith('comment-input-')) {
            e.preventDefault();
            const postId = e.target.id.replace('comment-input-', '');
            addComment(postId);
        }
        if (e.key === 'Enter' && e.target.id === 'clubMobileChatInput') {
            e.preventDefault();
            sendMobileMessage();
        }
        if (e.key === 'Enter' && e.target.id === 'chatInput') {
            e.preventDefault();
            sendMessage();
        }
    });

    const hamburger = document.getElementById('hamburgerBtn');
    const sideMenu = document.getElementById('sideMenu');
    const overlay = document.getElementById('menuOverlay');
    const closeBtn = document.getElementById('closeMenuBtn');

    function openMenu() {
        sideMenu.classList.add('open');
        overlay.classList.add('show');
        hamburger.classList.add('open');
        
        const links = document.querySelectorAll('.side-menu-items a');
        links.forEach(link => {
            link.classList.remove('animate');
            void link.offsetWidth;
            link.classList.add('animate');
        });
    }

    function closeMenu() {
        sideMenu.classList.remove('open');
        overlay.classList.remove('show');
        hamburger.classList.remove('open');
        
        const links = document.querySelectorAll('.side-menu-items a');
        links.forEach(link => {
            link.classList.remove('animate');
        });
    }

    hamburger.addEventListener('click', function() {
        if (sideMenu.classList.contains('open')) {
            closeMenu();
        } else {
            openMenu();
        }
    });

    if (closeBtn) {
        closeBtn.addEventListener('click', closeMenu);
    }

    overlay.addEventListener('click', closeMenu);

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && sideMenu.classList.contains('open')) {
            closeMenu();
        }
    });

    function logout() {
        localStorage.removeItem('token');
        window.location.href = '/'; 
    }

    loadClub();
</script>
